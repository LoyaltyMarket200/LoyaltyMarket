<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Waterside</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="footer.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#0d6e6e">
<style>
:root{--navy:#0d6e6e;--navy-soft:#e3f2f2;--orange:#ff6b4a;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.icon{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.simple-navbar{min-height:50px;height:auto;padding:7px max(20px,4vw);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.simple-navbar .logo-link{display:flex;align-items:center;gap:9px;text-decoration:none}
.simple-navbar .logo-link img{width:26px;height:26px;object-fit:contain}
.simple-navbar .logo-text{color:var(--navy);font-size:14px;font-weight:700}
.simple-nav-actions{display:flex;align-items:center;gap:8px}
.simple-nav-link{min-height:31px;display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border:1px solid var(--line);border-radius:8px;color:var(--ink);background:#fff;text-decoration:none;font-size:12px;font-weight:500}
.simple-nav-link:hover{border-color:var(--navy);color:var(--navy)}
.page-shell{width:min(700px,92%);margin:26px auto 60px}
.page-title{margin:0 0 18px;font-size:19px;font-weight:600;color:var(--ink)}
.convo-item{display:flex;gap:12px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:9px;text-decoration:none;color:inherit}
.convo-item.unread{border-color:var(--navy);background:var(--navy-soft)}
.convo-avatar{flex-shrink:0;width:42px;height:42px;border-radius:50%;background:var(--navy-soft);color:var(--navy);display:flex;align-items:center;justify-content:center}
.convo-body{flex:1;min-width:0}
.convo-title{font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.convo-preview{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.convo-time{flex-shrink:0;font-size:11px;color:#94a3b8}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0}
.empty-state{padding:44px 20px;text-align:center;border:1px dashed var(--line);border-radius:12px;background:#fff;color:var(--muted);font-size:13px}
@media (max-width:700px){.simple-navbar{flex-wrap:wrap;gap:10px}.simple-nav-actions{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.page-shell{margin-top:16px}}
</style>
</head>
<body>
<header class="navbar simple-navbar">
  <a href="index.html" class="logo-link"><img src="icons/icon-512.png" alt="Waterside"><span class="logo-text">Waterside</span></a>
  <div class="simple-nav-actions">
    <a href="index.html" class="simple-nav-link">Home</a>
    <a href="dashboard.html" class="simple-nav-link">Dashboard</a>
    <a href="notifications.html" class="simple-nav-link">Notifications</a>
  </div>
</header>

<section class="page-shell">
  <h1 class="page-title">Messages</h1>
  <div id="convoList"><p class="empty-state">Loading your conversations...</p></div>
</section>

<footer class="lm-footer" id="marketplaceFooter">
  <div class="lm-footer-simple site-shell">
    <p class="lm-footer-tagline">Liberia's Trusted Marketplace</p>
    <p class="lm-footer-copyright">&copy; 2026 <span data-marketplace-name>Waterside</span></p>
  </div>
</footer>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const convoList = document.getElementById("convoList");
let currentUser = null;

function safeText(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function formatDate(ts){if(!ts||!ts.seconds)return "";const d=new Date(ts.seconds*1000);const days=Math.floor((Date.now()-d.getTime())/86400000);if(days<1)return d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});if(days<7)return d.toLocaleDateString(undefined,{weekday:"short"});return d.toLocaleDateString();}

async function loadConversations(){
  try{
    const q = query(collection(db,"messages"), where("participants","array-contains",currentUser.uid));
    const snapshot = await getDocs(q);
    const allMessages = snapshot.docs.map(d=>({id:d.id,...d.data()}));

    if(allMessages.length===0){
      convoList.innerHTML = '<p class="empty-state">You have no messages yet. Start a chat from any listing.</p>';
      return;
    }

    // Group by the other participant so each person shows once,
    // with their most recent message as the preview.
    const conversations = {};

    allMessages.forEach(msg=>{
      const otherUserId = (msg.participants||[]).find(id=>id!==currentUser.uid);
      if(!otherUserId) return;

      const existing = conversations[otherUserId];
      const msgTime = msg.createdAt?.seconds || 0;

      if(!existing || msgTime > (existing.createdAt?.seconds||0)){
        conversations[otherUserId] = msg;
      }

      if(msg.receiverId===currentUser.uid && msg.read===false){
        conversations[otherUserId]._hasUnread = true;
      }
    });

    const entries = Object.entries(conversations)
      .sort((a,b)=>(b[1].createdAt?.seconds||0)-(a[1].createdAt?.seconds||0));

    const rows = await Promise.all(entries.map(async ([otherUserId, msg])=>{
      let otherName = "Waterside User";
      try{
        const userSnap = await getDoc(doc(db,"users",otherUserId));
        if(userSnap.exists()) otherName = userSnap.data().name || userSnap.data().businessName || otherName;
      }catch(e){}

      const isUnread = Boolean(msg._hasUnread);
      const chatUrl = `chat.html?with=${encodeURIComponent(otherUserId)}${msg.productId?`&product=${encodeURIComponent(msg.productId)}`:""}`;

      return `
        <a class="convo-item ${isUnread?"unread":""}" href="${chatUrl}">
          <div class="convo-avatar"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></div>
          <div class="convo-body">
            <div class="convo-title">${safeText(otherName)}</div>
            <div class="convo-preview">${safeText(msg.text||msg.message||"")}</div>
          </div>
          ${isUnread ? '<span class="unread-dot"></span>' : ""}
          <span class="convo-time">${formatDate(msg.createdAt)}</span>
        </a>
      `;
    }));

    convoList.innerHTML = rows.join("");
  }catch(error){
    convoList.innerHTML = '<p class="empty-state">Could not load your messages right now.</p>';
    console.error(error.message);
  }
}

onAuthStateChanged(auth,(user)=>{
  if(!user){ alert("Please log in to view your messages."); window.location.href="login.html"; return; }
  currentUser = user;
  loadConversations();
});
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js").catch(()=>{});}</script>
</body>
</html>
