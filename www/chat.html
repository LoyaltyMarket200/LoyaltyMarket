<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat - Waterside</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#0d6e6e">
<style>
:root{--navy:#0d6e6e;--navy-soft:#e3f2f2;--orange:#ff6b4a;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;display:flex;flex-direction:column}
.icon{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chat-navbar{min-height:52px;padding:8px max(16px,4vw);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
.chat-back-link{color:var(--ink);text-decoration:none;display:flex;align-items:center}
.chat-navbar-title{font-size:14.5px;font-weight:600;color:var(--ink)}
.chat-navbar-sub{font-size:11.5px;color:var(--muted)}
.chat-shell{flex:1;width:min(700px,94%);margin:0 auto;padding:14px 0 90px;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.chat-bubble-row{display:flex}
.chat-bubble-row.own{justify-content:flex-end}
.chat-bubble{max-width:78%;padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.5}
.chat-bubble-row.own .chat-bubble{background:var(--navy);color:#fff;border-bottom-right-radius:4px}
.chat-bubble-row:not(.own) .chat-bubble{background:#fff;border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:4px}
.chat-bubble-time{display:block;margin-top:4px;font-size:10px;opacity:.7}
.chat-input-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:10px max(16px,4vw);display:flex;gap:9px;align-items:center}
.chat-input{flex:1;min-height:42px;padding:9px 13px;border:1px solid var(--line);border-radius:999px;font:inherit;font-size:13.5px;color:var(--ink)}
.chat-input:focus{outline:none;border-color:var(--navy)}
.chat-send-btn{width:42px;height:42px;border-radius:50%;border:none;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-send-btn:disabled{opacity:.6;cursor:not-allowed}
.empty-state{padding:44px 20px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<header class="chat-navbar">
  <a href="messages.html" class="chat-back-link"><svg class="icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg></a>
  <div>
    <div class="chat-navbar-title" id="chatTitle">Chat</div>
    <div class="chat-navbar-sub" id="chatSub"></div>
  </div>
</header>

<main class="chat-shell" id="chatShell">
  <p class="empty-state">Loading conversation...</p>
</main>

<div class="chat-input-bar">
  <input type="text" id="chatInput" class="chat-input" placeholder="Type a message">
  <button type="button" id="chatSendBtn" class="chat-send-btn" aria-label="Send">
    <svg class="icon" viewBox="0 0 24 24"><path d="m3 3 18 9-18 9 4-9-4-9Z"/></svg>
  </button>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import {
  collection, query, where, orderBy, onSnapshot, addDoc, doc, getDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const otherUserId = params.get("with") || params.get("seller");
const productId = params.get("product") || "";
const initialMessage = params.get("message") || "";

const chatTitle = document.getElementById("chatTitle");
const chatSub = document.getElementById("chatSub");
const chatShell = document.getElementById("chatShell");
const chatInput = document.getElementById("chatInput");
const chatSendBtn = document.getElementById("chatSendBtn");

let currentUser = null;
let unsubscribe = null;

function safeText(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function formatTime(ts){if(!ts||!ts.seconds)return "";return new Date(ts.seconds*1000).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});}

async function loadOtherUserInfo(){
  try{
    const userSnap = await getDoc(doc(db,"users",otherUserId));
    if(userSnap.exists()){
      const data = userSnap.data();
      chatTitle.textContent = data.name || data.businessName || "Waterside User";
    }
  }catch(e){}

  if(productId){
    try{
      const productSnap = await getDoc(doc(db,"products",productId));
      if(productSnap.exists()) chatSub.textContent = "About: " + (productSnap.data().title || "");
    }catch(e){}
  }
}

function renderMessages(messages){
  if(messages.length===0){
    chatShell.innerHTML = '<p class="empty-state">No messages yet. Say hello!</p>';
    return;
  }

  chatShell.innerHTML = messages.map(msg=>{
    const isOwn = msg.senderId===currentUser.uid;
    return `
      <div class="chat-bubble-row ${isOwn?"own":""}">
        <div class="chat-bubble">
          ${safeText(msg.text||msg.message||"")}
          <span class="chat-bubble-time">${formatTime(msg.createdAt)}</span>
        </div>
      </div>
    `;
  }).join("");

  chatShell.scrollTop = chatShell.scrollHeight;

  messages
    .filter(msg=>msg.receiverId===currentUser.uid && msg.read===false)
    .forEach(msg=>{
      updateDoc(doc(db,"messages",msg.id), {read:true, readAt: serverTimestamp()}).catch(()=>{});
    });
}

function listenForMessages(){
  const q = query(
    collection(db,"messages"),
    where("participants","array-contains",currentUser.uid),
    orderBy("createdAt","asc")
  );

  unsubscribe = onSnapshot(q, (snapshot)=>{
    const messages = snapshot.docs
      .map(d=>({id:d.id,...d.data()}))
      .filter(msg=>(msg.participants||[]).includes(otherUserId));

    renderMessages(messages);
  }, (error)=>{
    chatShell.innerHTML = '<p class="empty-state">Could not load this conversation.</p>';
    console.error(error.message);
  });
}

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text || !otherUserId) return;

  chatSendBtn.disabled = true;

  try{
    await addDoc(collection(db,"messages"), {
      senderId: currentUser.uid,
      receiverId: otherUserId,
      participants: [currentUser.uid, otherUserId],
      text,
      productId: productId || null,
      read: false,
      createdAt: serverTimestamp()
    });

    try{
      await addDoc(collection(db,"notifications"), {
        userId: otherUserId,
        type: "message",
        title: "New message",
        body: text.slice(0,80),
        link: "chat.html?with=" + encodeURIComponent(currentUser.uid) + (productId?`&product=${encodeURIComponent(productId)}`:""),
        read: false,
        createdAt: serverTimestamp()
      });
    }catch(e){}

    chatInput.value = "";
  }catch(error){
    alert("Could not send message: " + error.message);
  }finally{
    chatSendBtn.disabled = false;
  }
}

chatSendBtn.addEventListener("click", sendMessage);
chatInput.addEventListener("keydown", (event)=>{
  if(event.key==="Enter"){ event.preventDefault(); sendMessage(); }
});

onAuthStateChanged(auth,(user)=>{
  if(!user){ alert("Please log in to chat."); window.location.href="login.html"; return; }
  if(!otherUserId){ chatShell.innerHTML = '<p class="empty-state">No conversation was specified.</p>'; return; }
  if(user.uid===otherUserId){ chatShell.innerHTML = '<p class="empty-state">You can\'t message yourself.</p>'; return; }

  currentUser = user;
  loadOtherUserInfo();
  listenForMessages();

  if(initialMessage) chatInput.value = initialMessage;
});
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js").catch(()=>{});}</script>
</body>
</html>
