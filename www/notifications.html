<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - Waterside</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="footer.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#0d6e6e">
<style>
:root{--navy:#0d6e6e;--navy-soft:#e3f2f2;--orange:#ff6b4a;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.icon{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.simple-navbar{min-height:50px;height:auto;padding:7px max(20px,4vw);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.simple-navbar .logo-link{display:flex;align-items:center;gap:9px;text-decoration:none}
.simple-navbar .logo-link img{width:26px;height:26px;object-fit:contain}
.simple-navbar .logo-text{color:var(--navy);font-size:14px;font-weight:700}
.simple-nav-actions{display:flex;align-items:center;gap:8px}
.simple-nav-link{min-height:31px;display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border:1px solid var(--line);border-radius:8px;color:var(--ink);background:#fff;text-decoration:none;font-size:12px;font-weight:500}
.simple-nav-link:hover{border-color:var(--navy);color:var(--navy)}
.page-shell{width:min(700px,92%);margin:26px auto 60px}
.page-title{margin:0 0 18px;font-size:19px;font-weight:600;color:var(--ink)}
.notif-item{display:flex;gap:12px;padding:15px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:10px;text-decoration:none;color:inherit;cursor:pointer}
.notif-item.unread{border-color:var(--navy);background:var(--navy-soft)}
.notif-icon{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--navy)}
.notif-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:3px}
.notif-body{font-size:12.5px;color:var(--muted);line-height:1.5}
.notif-time{font-size:11px;color:#94a3b8;margin-top:4px}
.empty-state{padding:44px 20px;text-align:center;border:1px dashed var(--line);border-radius:12px;background:#fff;color:var(--muted);font-size:13px}
@media (max-width:700px){.simple-navbar{flex-wrap:wrap;gap:10px}.simple-nav-actions{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.page-shell{margin-top:16px}}
</style>
</head>
<body>
<header class="navbar simple-navbar">
  <a href="index.html" class="logo-link"><img src="icons/icon-512.png" alt="Waterside"><span class="logo-text">Waterside</span></a>
  <div class="simple-nav-actions">
    <a href="index.html" class="simple-nav-link">Home</a>
    <a href="dashboard.html" class="simple-nav-link">Dashboard</a>
    <a href="messages.html" class="simple-nav-link">Messages</a>
  </div>
</header>

<section class="page-shell">
  <h1 class="page-title">Notifications</h1>
  <div id="notifList"><p class="empty-state">Loading notifications...</p></div>
</section>

<footer class="lm-footer" id="marketplaceFooter">
  <div class="lm-footer-simple site-shell">
    <p class="lm-footer-tagline">Liberia's Trusted Marketplace</p>
    <p class="lm-footer-copyright">&copy; 2026 <span data-marketplace-name>Waterside</span></p>
  </div>
</footer>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { collection, query, where, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const notifList = document.getElementById("notifList");
let currentUser = null;

function safeText(v){return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");}
function formatDate(ts){if(!ts||!ts.seconds)return "";return new Date(ts.seconds*1000).toLocaleString();}

async function loadNotifications(){
  try{
    const q = query(collection(db,"notifications"), where("userId","==",currentUser.uid));
    const snapshot = await getDocs(q);
    let items = snapshot.docs.map(d=>({id:d.id,...d.data()}));
    items.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

    if(items.length===0){
      notifList.innerHTML = '<p class="empty-state">You have no notifications yet.</p>';
      return;
    }

    notifList.innerHTML = items.map(n=>`
      <a class="notif-item ${n.read?"":"unread"}" data-notif-id="${safeText(n.id)}" href="${safeText(n.link||"#")}">
        <div class="notif-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V5l-8-3Z"/></svg></div>
        <div>
          <div class="notif-title">${safeText(n.title||"Notification")}</div>
          <div class="notif-body">${safeText(n.body||"")}</div>
          <div class="notif-time">${formatDate(n.createdAt)}</div>
        </div>
      </a>
    `).join("");

    document.querySelectorAll("[data-notif-id]").forEach(el=>{
      el.addEventListener("click", async ()=>{
        try{ await updateDoc(doc(db,"notifications",el.dataset.notifId), {read:true, readAt: new Date()}); }catch(e){}
      });
    });
  }catch(error){
    notifList.innerHTML = '<p class="empty-state">Could not load notifications right now.</p>';
    console.error(error.message);
  }
}

onAuthStateChanged(auth,(user)=>{
  if(!user){ alert("Please log in to view notifications."); window.location.href="login.html"; return; }
  currentUser = user;
  loadNotifications();
});
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js").catch(()=>{});}</script>
</body>
</html>
