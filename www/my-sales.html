<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Sales - Waterside</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#0d6e6e">

  <style>
    :root{
      --navy:#0d6e6e;
      --navy-soft:#e3f2f2;
      --orange:#ff6b4a;
      --orange-soft:#ffece7;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --bg:#f7f8fa;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
    .icon{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

    .sales-navbar{min-height:50px;height:auto;padding:7px max(20px,4vw);background:#fff;border-bottom:1px solid var(--line);justify-content:space-between;position:sticky;top:0;z-index:40;display:flex;align-items:center}
    .sales-navbar .logo-link{display:flex;align-items:center;gap:8px;text-decoration:none}
    .sales-navbar .logo-link img{width:26px;height:26px;object-fit:contain}
    .sales-navbar .logo-text{color:var(--navy);font-size:14px;font-weight:700}
    .sales-nav-actions{display:flex;align-items:center;gap:8px}
    .sales-nav-link,.sales-post-link{min-height:31px;display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:8px;text-decoration:none;font-size:12px;font-weight:500;border:1px solid var(--line)}
    .sales-nav-link{color:var(--ink);background:#fff}
    .sales-nav-link:hover{color:var(--navy);border-color:var(--navy)}
    .sales-post-link{color:#fff;background:var(--orange);border-color:var(--orange)}

    .sales-shell{width:min(880px,94%);margin:22px auto 60px}
    .sales-plain-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap}
    .sales-plain-header h1{margin:0;font-size:19px;font-weight:600;color:var(--ink)}
    .sales-plain-header p{margin:3px 0 0;color:var(--muted);font-size:12.5px;font-weight:400}

    .sales-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:16px}
    .sales-stat{padding:13px;border:1px solid var(--line);border-radius:12px;background:#fff;text-align:center}
    .sales-stat-value{font-size:19px;font-weight:700;color:var(--navy)}
    .sales-stat-label{margin-top:3px;color:var(--muted);font-size:10.5px;font-weight:500}

    .sales-filter-row{display:flex;gap:5px;margin-bottom:16px;padding:5px;border-radius:999px;background:#eef2f6;width:fit-content;max-width:100%;overflow-x:auto}
    .sales-filter-btn{flex-shrink:0;border:0;background:transparent;padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
    .sales-filter-btn.active{background:#fff;color:var(--navy)}

    .sale-card{display:grid;grid-template-columns:64px minmax(0,1fr);gap:13px;padding:15px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:12px}
    .sale-card img{width:64px;height:64px;border-radius:10px;object-fit:cover;background:#f1f5f9}
    .sale-card-title{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
    .sale-card-price{font-size:13.5px;font-weight:700;color:var(--orange);margin-bottom:6px}
    .sale-badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .sale-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:10.5px;font-weight:600}
    .sale-badge.payment-awaiting_payment{background:var(--orange-soft);color:#c23f24}
    .sale-badge.payment-paid,.sale-badge.status-completed{background:var(--navy-soft);color:var(--navy)}
    .sale-badge.protection{background:var(--navy-soft);color:var(--navy)}
    .sale-badge.awaiting-release{background:var(--orange-soft);color:#c23f24}
    .sale-card-meta{color:var(--muted);font-size:11.5px;margin-bottom:10px}
    .sale-card-actions{display:flex;gap:8px;flex-wrap:wrap}
    .sale-action-btn{min-height:34px;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);text-decoration:none;display:inline-flex;align-items:center}
    .sale-action-btn:hover{border-color:var(--navy)}

    .sales-empty{padding:44px 20px;text-align:center;border:1px dashed var(--line);border-radius:14px;background:#fff;color:var(--muted);font-size:13px}
    .sales-empty a{color:var(--navy);font-weight:600;text-decoration:none}

    .footer{background:var(--navy);color:#d8f3f1;text-align:center;padding:26px 20px}
    .footer h2{color:#fff;margin-bottom:6px;font-size:15px;font-weight:600}
    .footer p{margin-bottom:5px;font-size:12px}

    @media(max-width:600px){
      .sales-navbar{flex-wrap:wrap;gap:8px}
      .sales-nav-actions{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}
      .sales-shell{margin-top:16px}
      .sales-stats{grid-template-columns:1fr 1fr}
      .sale-card{grid-template-columns:52px minmax(0,1fr)}
      .sale-card img{width:52px;height:52px}
    }
  </style>
</head>

<body>
  <header class="navbar sales-navbar">
    <a href="index.html" class="logo-link">
      <img src="icons/icon-512.png" alt="Waterside">
      <span class="logo-text">Waterside</span>
    </a>
    <div class="sales-nav-actions">
      <a href="index.html" class="sales-nav-link">Home</a>
      <a href="dashboard.html" class="sales-nav-link">Dashboard</a>
      <a href="sell.html" class="sales-post-link">Post An Ad</a>
    </div>
  </header>

  <section class="sales-shell">
    <div class="sales-plain-header">
      <div>
        <h1>My Sales</h1>
        <p>Orders placed by buyers on your listings.</p>
      </div>
    </div>

    <div class="sales-stats">
      <div class="sales-stat">
        <div class="sales-stat-value" id="statTotalSales">0</div>
        <div class="sales-stat-label">Total Orders</div>
      </div>
      <div class="sales-stat">
        <div class="sales-stat-value" id="statAwaitingRelease">0</div>
        <div class="sales-stat-label">Awaiting Your Delivery</div>
      </div>
      <div class="sales-stat">
        <div class="sales-stat-value" id="statCompletedSales">0</div>
        <div class="sales-stat-label">Completed</div>
      </div>
    </div>

    <div class="sales-filter-row">
      <button class="sales-filter-btn active" data-filter="all">All</button>
      <button class="sales-filter-btn" data-filter="awaiting_payment">Awaiting Payment</button>
      <button class="sales-filter-btn" data-filter="paid">Paid</button>
      <button class="sales-filter-btn" data-filter="completed">Completed</button>
    </div>

    <div id="salesList">
      <p class="sales-empty">Loading your sales...</p>
    </div>
  </section>

  <footer class="footer">
    <h2>Waterside</h2>
    <p>Buy And Sell Products Across Liberia.</p>
    <p>&copy; 2026 Waterside. All Rights Reserved.</p>
  </footer>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      collection, query, where, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const salesList = document.getElementById("salesList");
    const filterButtons = document.querySelectorAll(".sales-filter-btn");
    const statTotalSales = document.getElementById("statTotalSales");
    const statAwaitingRelease = document.getElementById("statAwaitingRelease");
    const statCompletedSales = document.getElementById("statCompletedSales");

    const FALLBACK_IMAGE = "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&h=200&fit=crop";

    let currentUser = null;
    let allSales = [];
    let currentFilter = "all";

    function safeText(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(timestamp) {
      if (!timestamp || !timestamp.seconds) return "";
      return new Date(timestamp.seconds * 1000).toLocaleDateString(undefined, {
        month: "short", day: "numeric", year: "numeric"
      });
    }

    function paymentStatusLabel(order) {
      const map = {
        awaiting_payment: "Awaiting Payment",
        paid: "Paid",
        failed: "Payment Failed"
      };
      return map[order.paymentStatus] || "Awaiting Payment";
    }

    function updateStats() {
      statTotalSales.textContent = allSales.length;

      statAwaitingRelease.textContent = allSales.filter((order) =>
        order.protectionEnabled === true &&
        order.paymentStatus === "paid" &&
        order.status !== "completed"
      ).length;

      statCompletedSales.textContent = allSales.filter((order) =>
        order.status === "completed"
      ).length;
    }

    function renderSales() {
      const filtered = currentFilter === "all"
        ? allSales
        : allSales.filter((order) => {
            if (currentFilter === "completed") return order.status === "completed";
            return (order.paymentStatus || "awaiting_payment") === currentFilter;
          });

      if (filtered.length === 0) {
        salesList.innerHTML = `
          <div class="sales-empty">
            No sales in this view yet. <a href="sell.html">Post a listing</a> to start selling.
          </div>
        `;
        return;
      }

      salesList.innerHTML = filtered.map((order) => {
        const image = order.productImage || FALLBACK_IMAGE;
        const paymentStatus = order.paymentStatus || "awaiting_payment";
        const isProtected = order.protectionEnabled === true;
        const isCompleted = order.status === "completed";
        const awaitingRelease = isProtected && paymentStatus === "paid" && !isCompleted;

        return `
          <article class="sale-card">
            <img src="${safeText(image)}" alt="${safeText(order.productTitle || "Product")}">

            <div>
              <div class="sale-card-title">${safeText(order.productTitle || "Untitled Order")}</div>
              <div class="sale-card-price">US$${safeText(order.priceUsd || "0")} | L$${safeText(order.priceLrd || "0")}</div>

              <div class="sale-badge-row">
                <span class="sale-badge payment-${safeText(paymentStatus)}">${paymentStatusLabel(order)}</span>
                ${isProtected ? '<span class="sale-badge protection">Buyer Protection</span>' : ""}
                ${awaitingRelease ? '<span class="sale-badge awaiting-release">Awaiting Buyer Confirmation</span>' : ""}
                ${isCompleted ? '<span class="sale-badge status-completed">Completed</span>' : ""}
              </div>

              <div class="sale-card-meta">
                Buyer pays via ${safeText(order.paymentMethod === "orange" ? "Orange Money" : "MTN Mobile Money")}
                • ${formatDate(order.createdAt)}
              </div>

              <div class="sale-card-actions">
                <a class="sale-action-btn" href="product-detail.html?id=${encodeURIComponent(order.productId || "")}">
                  View Listing
                </a>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadSales() {
      salesList.innerHTML = '<p class="sales-empty">Loading your sales...</p>';

      try {
        const salesQuery = query(collection(db, "orders"), where("sellerId", "==", currentUser.uid));
        const snapshot = await getDocs(salesQuery);

        allSales = snapshot.docs
          .map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }))
          .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        updateStats();
        renderSales();
      } catch (error) {
        salesList.innerHTML = `<p class="sales-empty">Could not load sales: ${safeText(error.message)}</p>`;
      }
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        filterButtons.forEach((b) => b.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        renderSales();
      });
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please log in to view your sales.");
        window.location.href = "login.html";
        return;
      }

      currentUser = user;
      loadSales();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
