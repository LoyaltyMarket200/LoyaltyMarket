<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Settings - Waterside</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="footer.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#0d6e6e">
<style>
:root{--navy:#0d6e6e;--navy-soft:#e3f2f2;--orange:#ff6b4a;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.simple-navbar{min-height:50px;height:auto;padding:7px max(20px,4vw);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.simple-navbar .logo-link{display:flex;align-items:center;gap:9px;text-decoration:none}
.simple-navbar .logo-link img{width:26px;height:26px;object-fit:contain}
.simple-navbar .logo-text{color:var(--navy);font-size:14px;font-weight:700}
.simple-nav-actions{display:flex;align-items:center;gap:8px}
.simple-nav-link{min-height:31px;display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border:1px solid var(--line);border-radius:8px;color:var(--ink);background:#fff;text-decoration:none;font-size:12px;font-weight:500}
.simple-nav-link:hover{border-color:var(--navy);color:var(--navy)}
.page-shell{width:min(560px,92%);margin:26px auto 60px}
.page-title{margin:0 0 18px;font-size:19px;font-weight:600;color:var(--ink)}
.settings-card{padding:20px;border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:16px}
.settings-card h2{margin:0 0 4px;font-size:15px;font-weight:600;color:var(--ink)}
.settings-card p.card-sub{margin:0 0 14px;color:var(--muted);font-size:12px}
.settings-card label{display:block;margin-top:12px;margin-bottom:6px;font-size:13px;font-weight:500;color:var(--ink)}
.settings-card input,.settings-card select{width:100%;min-height:44px;padding:10px 13px;border:1px solid var(--line);border-radius:9px;font:inherit;font-size:13.5px;color:var(--ink);box-sizing:border-box}
.settings-card input:focus,.settings-card select:focus{outline:none;border-color:var(--navy)}
.settings-card input:disabled{background:#f1f5f9;color:var(--muted)}
.save-btn{width:100%;min-height:46px;margin-top:16px;border:none;border-radius:10px;background:var(--orange);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer}
.save-btn:hover{background:#e5522f}
.save-btn:disabled{opacity:.6;cursor:not-allowed}
.reset-btn{width:100%;min-height:44px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);font-weight:600;font-size:13px;cursor:pointer}
.reset-btn:hover{border-color:var(--navy);color:var(--navy)}
.success-msg{display:none;margin-top:10px;padding:10px 13px;border-radius:8px;background:var(--navy-soft);color:var(--navy);font-size:12.5px}
.success-msg.show{display:block}
@media (max-width:700px){.simple-navbar{flex-wrap:wrap;gap:10px}.simple-nav-actions{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.page-shell{margin-top:16px}}
</style>
</head>
<body>
<header class="navbar simple-navbar">
  <a href="index.html" class="logo-link"><img src="icons/icon-512.png" alt="Waterside"><span class="logo-text">Waterside</span></a>
  <div class="simple-nav-actions">
    <a href="index.html" class="simple-nav-link">Home</a>
    <a href="dashboard.html" class="simple-nav-link">Dashboard</a>
    <a href="messages.html" class="simple-nav-link">Messages</a>
  </div>
</header>

<section class="page-shell">
  <h1 class="page-title">Account Settings</h1>

  <div class="settings-card">
    <h2>Your Details</h2>
    <p class="card-sub">These details show on your profile and listings.</p>

    <form id="profileForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" disabled>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone">

      <label for="city">City</label>
      <input type="text" id="city" placeholder="Monrovia">

      <label for="county">County</label>
      <input type="text" id="county" placeholder="Montserrado">

      <div id="businessFieldsSection" style="display:none;">
        <label for="businessName">Business Name</label>
        <input type="text" id="businessName">

        <label for="businessCategory">Business Category</label>
        <input type="text" id="businessCategory">

        <label for="businessCity">Business City</label>
        <input type="text" id="businessCity">

        <label for="businessCounty">Business County</label>
        <input type="text" id="businessCounty">

        <label for="businessPhone">Business Phone</label>
        <input type="tel" id="businessPhone">

        <label for="businessRegistrationNumber">Business Registration Number</label>
        <input type="text" id="businessRegistrationNumber">
      </div>

      <button type="submit" class="save-btn" id="saveBtn">Save Changes</button>
      <div class="success-msg" id="successMsg">Your details have been saved.</div>
    </form>
  </div>

  <div class="settings-card">
    <h2>Password</h2>
    <p class="card-sub">We'll email you a link to reset your password.</p>
    <button type="button" class="reset-btn" id="resetBtn">Send Password Reset Email</button>
  </div>
</section>

<footer class="lm-footer" id="marketplaceFooter">
  <div class="lm-footer-simple site-shell">
    <p class="lm-footer-tagline">Liberia's Trusted Marketplace</p>
    <p class="lm-footer-copyright">&copy; 2026 <span data-marketplace-name>Waterside</span></p>
  </div>
</footer>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const profileForm = document.getElementById("profileForm");
const saveBtn = document.getElementById("saveBtn");
const successMsg = document.getElementById("successMsg");
const resetBtn = document.getElementById("resetBtn");
const businessFieldsSection = document.getElementById("businessFieldsSection");

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const phoneInput = document.getElementById("phone");
const cityInput = document.getElementById("city");
const countyInput = document.getElementById("county");
const businessNameInput = document.getElementById("businessName");
const businessCategoryInput = document.getElementById("businessCategory");
const businessCityInput = document.getElementById("businessCity");
const businessCountyInput = document.getElementById("businessCounty");
const businessPhoneInput = document.getElementById("businessPhone");
const businessRegistrationNumberInput = document.getElementById("businessRegistrationNumber");

let currentUser = null;

async function loadProfile(){
  emailInput.value = currentUser.email || "";

  try{
    const userSnap = await getDoc(doc(db,"users",currentUser.uid));
    if(!userSnap.exists()) return;

    const data = userSnap.data();
    nameInput.value = data.name || "";
    phoneInput.value = data.phone || "";
    cityInput.value = data.city || "";
    countyInput.value = data.county || "";

    if((data.accountType||"personal")==="business"){
      businessFieldsSection.style.display = "block";
      businessNameInput.value = data.businessName || "";
      businessCategoryInput.value = data.businessCategory || "";
      businessCityInput.value = data.businessCity || "";
      businessCountyInput.value = data.businessCounty || "";
      businessPhoneInput.value = data.businessPhone || "";
      businessRegistrationNumberInput.value = data.businessRegistrationNumber || "";
    }
  }catch(error){
    console.error("Could not load profile:", error.message);
  }
}

profileForm.addEventListener("submit", async (event)=>{
  event.preventDefault();

  saveBtn.disabled = true;
  saveBtn.textContent = "Saving...";
  successMsg.classList.remove("show");

  try{
    const changes = {
      name: nameInput.value.trim(),
      phone: phoneInput.value.trim(),
      city: cityInput.value.trim(),
      county: countyInput.value.trim()
    };

    if(businessFieldsSection.style.display !== "none"){
      changes.businessName = businessNameInput.value.trim();
      changes.businessCategory = businessCategoryInput.value.trim();
      changes.businessCity = businessCityInput.value.trim();
      changes.businessCounty = businessCountyInput.value.trim();
      changes.businessPhone = businessPhoneInput.value.trim();
      changes.businessRegistrationNumber = businessRegistrationNumberInput.value.trim();
    }

    await updateDoc(doc(db,"users",currentUser.uid), changes);

    successMsg.classList.add("show");
  }catch(error){
    alert("Could not save your changes: " + error.message);
  }finally{
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Changes";
  }
});

resetBtn.addEventListener("click", async ()=>{
  if(!currentUser?.email) return;
  if(!confirm(`Send a password-reset email to ${currentUser.email}?`)) return;

  try{
    await sendPasswordResetEmail(auth, currentUser.email);
    alert("Password-reset email sent to " + currentUser.email);
  }catch(error){
    alert("Could not send reset email: " + error.message);
  }
});

onAuthStateChanged(auth,(user)=>{
  if(!user){ alert("Please log in to view your account settings."); window.location.href="login.html"; return; }
  currentUser = user;
  loadProfile();
});
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("service-worker.js").catch(()=>{});}</script>
</body>
</html>
