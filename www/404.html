<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - Waterside</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<meta name="theme-color" content="#0d6e6e">
<style>
:root{--navy:#0d6e6e;--navy-soft:#e3f2f2;--orange:#ff6b4a;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--bg:#f7f8fa;}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;text-align:center;padding:20px}
.icon{display:inline-block;width:1em;height:1em;vertical-align:-0.15em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-link{display:flex;align-items:center;gap:9px;text-decoration:none;margin-bottom:34px}
.logo-link img{width:30px;height:30px;object-fit:contain}
.logo-text{color:var(--navy);font-size:16px;font-weight:700}
.error-icon{width:70px;height:70px;border-radius:50%;background:var(--navy-soft);color:var(--navy);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.error-icon .icon{width:32px;height:32px}
h1{margin:0 0 8px;font-size:22px;font-weight:700;color:var(--ink)}
p{margin:0 0 26px;color:var(--muted);font-size:14px;line-height:1.6;max-width:360px}
.home-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:11px;background:var(--orange);color:#fff;font-weight:700;font-size:14px;text-decoration:none}
.home-btn:hover{background:#e5522f}
</style>
</head>
<body>
  <a href="index.html" class="logo-link">
    <img src="icons/icon-512.png" alt="Waterside">
    <span class="logo-text">Waterside</span>
  </a>

  <div class="error-icon">
    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5s1-1.5 2.5-1.5 2.5 1 2.5 2c0 1.5-2.5 1.5-2.5 3.5"/><path d="M12 17h.01"/></svg>
  </div>

  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist, may have been moved, or the listing is no longer available.</p>

  <a href="index.html" class="home-btn">
    <svg class="icon" viewBox="0 0 24 24"><path d="m3 12 9-9 9 9M5 10v10h5v-6h4v6h5V10"/></svg>
    Return to Homepage
  </a>
</body>
</html>
