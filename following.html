<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Following - Waterside</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="footer.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#0d6e6e">

  <style>
    :root{
      --navy:#0d6e6e;
      --navy-dark:#095959;
      --navy-soft:#e3f2f2;
      --orange:#ff6b4a;
      --ink:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --bg:#f7f8fa;
      --danger:#b91c1c;
      --danger-soft:#fee2e2;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    .following-navbar{
      min-height:50px;
      padding:7px max(20px,4vw);
      background:#fff;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      position:sticky;
      top:0;
      z-index:40;
    }

    .logo-link{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--navy);
      text-decoration:none;
      font-size:14px;
      font-weight:800;
    }

    .logo-link img{width:26px;height:26px;object-fit:contain}

    .nav-actions{display:flex;align-items:center;gap:8px}

    .nav-actions a{
      min-height:31px;
      padding:6px 12px;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fff;
      color:var(--ink);
      text-decoration:none;
      font-size:12px;
      font-weight:700;
    }

    .nav-actions a.primary{
      border-color:var(--orange);
      background:var(--orange);
      color:#fff;
    }

    .following-shell{
      width:min(1080px,94%);
      margin:26px auto 65px;
    }

    .following-header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .following-header h1{
      margin:0;
      font-size:24px;
    }

    .following-header p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .count-pill{
      padding:7px 11px;
      border-radius:999px;
      background:var(--navy-soft);
      color:var(--navy);
      font-size:12px;
      font-weight:800;
    }

    .following-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:15px;
    }

    .seller-card{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:15px;
      background:#fff;
    }

    .seller-cover{
      min-height:90px;
      padding:14px;
      background:linear-gradient(135deg,#0d6e6e,#134e72);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      color:#fff;
    }

    .seller-avatar{
      width:58px;
      height:58px;
      object-fit:cover;
      border-radius:15px;
      border:3px solid rgba(255,255,255,.92);
      background:#fff;
    }

    .seller-type{
      padding:5px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.16);
      font-size:10px;
      font-weight:800;
    }

    .seller-body{padding:15px}
    .seller-name{margin:0;font-size:16px;line-height:1.3}
    .seller-location{margin:7px 0 0;color:var(--muted);font-size:12px}
    .seller-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
    .badge{
      padding:4px 8px;
      border-radius:999px;
      background:var(--navy-soft);
      color:var(--navy);
      font-size:10px;
      font-weight:800;
    }

    .seller-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:14px;
    }

    .seller-actions a,
    .seller-actions button{
      min-height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 10px;
      border-radius:9px;
      border:1px solid var(--navy);
      background:#fff;
      color:var(--navy);
      text-decoration:none;
      font:inherit;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .seller-actions a{
      background:var(--navy);
      color:#fff;
    }

    .seller-actions button{
      border-color:#fecaca;
      color:var(--danger);
    }

    .seller-actions button:disabled{opacity:.6;cursor:not-allowed}

    .empty-state{
      grid-column:1/-1;
      padding:50px 20px;
      border:1px dashed #cbd5e1;
      border-radius:15px;
      background:#fff;
      color:var(--muted);
      text-align:center;
      font-size:13px;
      line-height:1.7;
    }

    .empty-state a{
      color:var(--navy);
      font-weight:800;
      text-decoration:none;
    }

    @media(max-width:900px){
      .following-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media(max-width:620px){
      .following-navbar{flex-wrap:wrap}
      .nav-actions{width:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}
      .nav-actions a{text-align:center}
      .following-header{align-items:flex-start;flex-direction:column}
      .following-grid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <header class="following-navbar">
    <a href="index.html" class="logo-link">
      <img src="icons/icon-512.png" alt="Waterside">
      <span>Waterside</span>
    </a>

    <nav class="nav-actions">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="sellers.html" class="primary">Find Sellers</a>
    </nav>
  </header>

  <main class="following-shell">
    <section class="following-header">
      <div>
        <h1>Sellers You Follow</h1>
        <p>Quickly return to trusted sellers and their latest listings.</p>
      </div>

      <span id="followingCount" class="count-pill">0 sellers</span>
    </section>

    <section id="followingGrid" class="following-grid">
      <div class="empty-state">Loading followed sellers...</div>
    </section>
  </main>

  <footer class="lm-footer" id="marketplaceFooter">
    <div class="lm-footer-simple site-shell">
      <p class="lm-footer-tagline">Liberia's Trusted Marketplace</p>
      <p class="lm-footer-copyright">&copy; 2026 Waterside</p>
    </div>
  </footer>

  <script type="module">
    import { auth, db } from "./firebase.js";

    import {
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    import {
      collection,
      deleteDoc,
      doc,
      getDoc,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const followingGrid = document.getElementById("followingGrid");
    const followingCount = document.getElementById("followingCount");

    let currentUser = null;
    let followedSellers = [];

    function safeText(value, fallback = "") {
      return String(value ?? fallback)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function truthy(value) {
      return value === true || String(value || "").toLowerCase() === "true";
    }

    function firstValue(...values) {
      return values.find((value) =>
        value !== null &&
        value !== undefined &&
        String(value).trim() !== ""
      ) || "";
    }

    function sellerType(seller) {
      const accountType = String(seller.accountType || "personal").toLowerCase();

      if (
        accountType === "business" ||
        truthy(seller.businessApproved) ||
        truthy(seller.businessVerified)
      ) {
        return "business";
      }

      if (
        accountType === "reseller" ||
        truthy(seller.resellerApproved) ||
        truthy(seller.resellerBadge) ||
        truthy(seller.isReseller) ||
        String(seller.resellerApplicationStatus || "").toLowerCase() === "approved"
      ) {
        return "reseller";
      }

      return "seller";
    }

    function profileUrl(seller) {
      const type = sellerType(seller);

      if (type === "business") {
        return `business-profile.html?id=${encodeURIComponent(seller.id)}`;
      }

      if (type === "reseller") {
        return `reseller-profile.html?id=${encodeURIComponent(seller.id)}`;
      }

      return `seller-profile.html?id=${encodeURIComponent(seller.id)}`;
    }

    function sellerName(seller) {
      return firstValue(
        seller.businessName,
        seller.resellerName,
        seller.name,
        seller.fullName,
        seller.displayName,
        seller.email,
        "Waterside Seller"
      );
    }

    function sellerPhoto(seller) {
      const type = sellerType(seller);

      if (type === "business") {
        return firstValue(
          seller.businessLogoUrl,
          seller.profileImageUrl,
          seller.photoURL,
          "icons/icon-512.png"
        );
      }

      if (type === "reseller") {
        return firstValue(
          seller.resellerPhotoUrl,
          seller.profilePhotoUrl,
          seller.photoUrl,
          seller.profileImageUrl,
          seller.photoURL,
          "icons/icon-512.png"
        );
      }

      return firstValue(
        seller.profileImageUrl,
        seller.photoURL,
        seller.avatarUrl,
        "icons/icon-512.png"
      );
    }

    function renderFollowing() {
      followingCount.textContent =
        `${followedSellers.length} seller${followedSellers.length === 1 ? "" : "s"}`;

      if (!followedSellers.length) {
        followingGrid.innerHTML = `
          <div class="empty-state">
            You are not following any sellers yet.<br>
            <a href="sellers.html">Find trusted sellers</a>
          </div>
        `;
        return;
      }

      followingGrid.innerHTML = followedSellers.map((seller) => {
        const name = sellerName(seller);
        const type = sellerType(seller);
        const location = [
          firstValue(seller.businessCity, seller.resellerCity, seller.city),
          firstValue(seller.businessCounty, seller.resellerCounty, seller.county)
        ].filter(Boolean).join(", ") || "Liberia";

        return `
          <article class="seller-card">
            <div class="seller-cover">
              <img class="seller-avatar" src="${safeText(sellerPhoto(seller))}" alt="${safeText(name)}" onerror="this.src='icons/icon-512.png'">
              <span class="seller-type">${safeText(type === "business" ? "Business" : type === "reseller" ? "Authorized Reseller" : "Seller")}</span>
            </div>

            <div class="seller-body">
              <h2 class="seller-name">${safeText(name)}</h2>
              <p class="seller-location">${safeText(location)}</p>

              <div class="seller-badges">
                ${truthy(seller.verified) || truthy(seller.businessVerified) || truthy(seller.resellerVerified)
                  ? '<span class="badge">Verified</span>'
                  : ""}
                ${type === "reseller"
                  ? '<span class="badge">Authorized Reseller</span>'
                  : ""}
                ${type === "business"
                  ? '<span class="badge">Business Store</span>'
                  : ""}
              </div>

              <div class="seller-actions">
                <a href="${profileUrl(seller)}">View Profile</a>
                <button type="button" data-unfollow="${safeText(seller.id)}">Unfollow</button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-unfollow]").forEach((button) => {
        button.addEventListener("click", () => unfollowSeller(button.dataset.unfollow, button));
      });
    }

    async function unfollowSeller(sellerId, button) {
      if (!confirm("Stop following this seller?")) return;

      button.disabled = true;
      button.textContent = "Removing...";

      try {
        await deleteDoc(doc(db, "followers", `${sellerId}_${currentUser.uid}`));
        followedSellers = followedSellers.filter((seller) => seller.id !== sellerId);
        renderFollowing();
      } catch (error) {
        alert("Could not unfollow seller: " + error.message);
        button.disabled = false;
        button.textContent = "Unfollow";
      }
    }

    async function loadFollowing() {
      try {
        const followSnapshot = await getDocs(
          query(
            collection(db, "followers"),
            where("followerId", "==", currentUser.uid)
          )
        );

        const sellerIds = [
          ...new Set(
            followSnapshot.docs
              .map((item) => item.data().sellerId)
              .filter(Boolean)
          )
        ];

        if (!sellerIds.length) {
          followedSellers = [];
          renderFollowing();
          return;
        }

        const sellerDocuments = await Promise.all(
          sellerIds.map(async (sellerId) => {
            const snapshot = await getDoc(doc(db, "users", sellerId));
            return snapshot.exists()
              ? { id:snapshot.id, ...snapshot.data() }
              : null;
          })
        );

        followedSellers = sellerDocuments.filter(Boolean);
        renderFollowing();
      } catch (error) {
        console.error("Could not load followed sellers:", error);
        followingGrid.innerHTML = `
          <div class="empty-state">
            Could not load followed sellers: ${safeText(error.message)}
          </div>
        `;
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please log in to view sellers you follow.");
        window.location.href =
          "login.html?redirect=" + encodeURIComponent("following.html");
        return;
      }

      currentUser = user;
      loadFollowing();
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    }
  </script>
</body>
</html>
