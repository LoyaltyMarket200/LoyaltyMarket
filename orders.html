<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - LoyaltyMarket</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#1e3a8a">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#0f172a}
    .orders-navbar{min-height:78px;height:auto;padding:12px max(24px,5vw);background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 4px 20px rgba(15,23,42,.06);justify-content:space-between;position:sticky;top:0;z-index:40}
    .orders-navbar .logo-link img{width:48px;height:48px;object-fit:contain}.orders-navbar .logo-text{color:#0f2d67;font-size:21px}
    .orders-nav-actions{display:flex;align-items:center;gap:10px}.orders-nav-link,.orders-post-link{min-height:42px;display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:800;border:1px solid transparent}
    .orders-nav-link{color:#334155;background:#f8fafc;border-color:#e2e8f0}.orders-post-link{color:#fff;background:#f97316}
    .orders-page{width:min(1180px,94%);margin:32px auto 70px}
    .orders-hero{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:32px;border-radius:24px;color:#fff;background:linear-gradient(135deg,#0f2d67,#1d4ed8);box-shadow:0 18px 42px rgba(30,58,138,.2)}
    .orders-kicker{margin:0 0 8px;color:#fbbf24;font-size:12px;font-weight:900;letter-spacing:.16em}.orders-hero h1{margin:0 0 8px;font-size:clamp(32px,5vw,48px)}.orders-hero p{margin:0;color:#dbeafe}
    .orders-summary{min-width:160px;padding:20px;border:1px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(255,255,255,.10);text-align:center}.orders-summary strong{display:block;font-size:30px}
    .orders-panel{margin-top:24px;padding:24px;border:1px solid #e2e8f0;border-radius:22px;background:#fff;box-shadow:0 14px 34px rgba(15,23,42,.07)}
    .orders-tabs{display:flex;gap:9px;flex-wrap:wrap;margin:0 0 20px}.orders-tab{background:#fff;border:1px solid #d1d5db;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:800;cursor:pointer}.orders-tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
    .orders-list{display:grid;gap:14px}.order-card{display:grid;grid-template-columns:92px minmax(0,1fr) auto;gap:16px;align-items:center;border:1px solid #e2e8f0;border-radius:16px;padding:14px}.order-card img{width:92px;height:92px;object-fit:cover;border-radius:12px}.order-info h4{margin:0 0 7px}.order-price{margin:0 0 7px;color:#ea580c;font-weight:900}.order-meta{display:block;color:#64748b;font-size:12px;margin-top:3px}
    .order-side{display:flex;flex-direction:column;align-items:flex-end;gap:10px}.order-status{font-size:12px;font-weight:900;padding:7px 11px;border-radius:999px;text-transform:capitalize}.pending{background:#fef3c7;color:#92400e}.confirmed{background:#dbeafe;color:#1e40af}.completed{background:#d1fae5;color:#065f46}.cancelled{background:#fee2e2;color:#991b1b}
    .order-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.order-btn{border:none;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer}.cancel-order-btn{background:#fff;border:1px solid #dc2626;color:#dc2626}.message-seller-btn{background:#2563eb;color:#fff;text-decoration:none}
    .orders-empty,.orders-error{padding:48px 24px;text-align:center;border-radius:18px}.orders-empty{border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b}.orders-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .orders-footer{display:flex;justify-content:space-between;align-items:center;padding:30px max(24px,6vw)}
    @media(max-width:760px){.orders-nav-actions{width:100%;display:grid;grid-template-columns:repeat(4,1fr)}.orders-hero{flex-direction:column;align-items:flex-start}.orders-summary{width:100%}.order-card{grid-template-columns:76px minmax(0,1fr)}.order-card img{width:76px;height:76px}.order-side{grid-column:2;align-items:flex-start}}@media(max-width:560px){.orders-nav-actions{grid-template-columns:1fr}.order-card{grid-template-columns:1fr}.order-card img{width:100%;height:220px}.order-side{grid-column:auto}.orders-footer{flex-direction:column;text-align:center}}
  </style>
</head>
<body>
<header class="navbar orders-navbar">
  <div class="logo"><a href="index.html" class="logo-link"><img src="icons/icon-512.png" alt="LoyaltyMarket"><span class="logo-text"><span class="lr-tag">LR</span>LoyaltyMarket</span></a></div>
  <div class="orders-nav-actions"><a href="index.html" class="orders-nav-link">Home</a><a href="messages.html" class="orders-nav-link">Messages</a><a href="dashboard.html" class="orders-nav-link">Dashboard</a><a href="sell.html" class="orders-post-link">Post An Ad</a></div>
</header>
<main class="orders-page">
  <section class="orders-hero"><div><p class="orders-kicker">BUYER CENTER</p><h1>My Orders</h1><p>Track your orders and contact sellers from one place.</p></div><div class="orders-summary"><strong id="ordersCount">0</strong><span>Total Orders</span></div></section>
  <section class="orders-panel">
    <div class="orders-tabs">
      <button class="orders-tab active" data-filter="all">All</button><button class="orders-tab" data-filter="pending">Pending</button><button class="orders-tab" data-filter="confirmed">Confirmed</button><button class="orders-tab" data-filter="completed">Completed</button><button class="orders-tab" data-filter="cancelled">Cancelled</button>
    </div>
    <div id="ordersList" class="orders-list"><div class="orders-empty"><h3>Loading your orders...</h3></div></div>
  </section>
</main>
<footer class="footer orders-footer"><div><h2>🇱🇷 LoyaltyMarket</h2><p>You Get Market, We Get Buyer.</p></div><p>&copy; 2026 LoyaltyMarket. All Rights Reserved.</p></footer>
<script type="module">
import {db,auth} from "./firebase.js";
import {collection,query,where,onSnapshot,doc,updateDoc,addDoc,serverTimestamp} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import {onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
const ordersList=document.getElementById("ordersList"),ordersCount=document.getElementById("ordersCount"),tabs=document.querySelectorAll(".orders-tab");
let currentUser=null,allOrders=[],activeFilter="all",unsubscribe=null;
const safe=v=>String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
function formatDate(t){if(!t)return"Date unavailable";const d=typeof t.toDate==="function"?t.toDate():new Date(t.seconds?t.seconds*1000:t);return Number.isNaN(d.getTime())?"Date unavailable":d.toLocaleString([],{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"})}
async function cancelOrder(order){
  if((order.status||"pending").toLowerCase()!=="pending")return;
  if(!confirm(`Cancel your order for "${order.productTitle||"this item"}"?`))return;
  try{
    await updateDoc(doc(db,"orders",order.id),{status:"cancelled",cancelledBy:"buyer",cancelledAt:serverTimestamp(),updatedAt:serverTimestamp()});
    await addDoc(collection(db,"notifications"),{userId:order.sellerId,type:"order",title:"Order cancelled",body:(order.productTitle||"An order")+" was cancelled by the buyer.",link:"my-sales.html",read:false,createdAt:serverTimestamp()}).catch(()=>{});
  }catch(e){alert("Could not cancel order: "+e.message)}
}
function render(){
  const rows=activeFilter==="all"?allOrders:allOrders.filter(o=>(o.status||"pending").toLowerCase()===activeFilter);
  ordersCount.textContent=String(allOrders.length);
  if(!rows.length){ordersList.innerHTML='<div class="orders-empty"><h3>No orders found</h3><p>You have no orders in this category.</p></div>';return}
  ordersList.innerHTML=rows.map(o=>{
    const status=(o.status||"pending").toLowerCase(),img=o.productImage||"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&h=200&fit=crop";
    const chatUrl="chat.html?product="+encodeURIComponent(o.productId||"")+"&user="+encodeURIComponent(o.sellerId||"");
    return `<article class="order-card"><img src="${safe(img)}" alt="${safe(o.productTitle||"Product")}"><div class="order-info"><h4><a href="product-detail.html?id=${encodeURIComponent(o.productId||"")}">${safe(o.productTitle||"Untitled Product")}</a></h4><p class="order-price">US$${safe(o.priceUsd||"0")} | L$${safe(o.priceLrd||"0")}</p><span class="order-meta">Ordered ${safe(formatDate(o.createdAt))}</span>${o.updatedAt?`<span class="order-meta">Updated ${safe(formatDate(o.updatedAt))}</span>`:""}</div><div class="order-side"><span class="order-status ${safe(status)}">${safe(status)}</span><div class="order-actions"><a class="order-btn message-seller-btn" href="${chatUrl}">Message Seller</a>${status==="pending"?`<button class="order-btn cancel-order-btn" data-id="${o.id}">Cancel Order</button>`:""}</div></div></article>`
  }).join("");
  document.querySelectorAll(".cancel-order-btn").forEach(btn=>btn.addEventListener("click",()=>{const o=allOrders.find(x=>x.id===btn.dataset.id);if(o)cancelOrder(o)}));
}
function listen(){const q=query(collection(db,"orders"),where("buyerId","==",currentUser.uid));unsubscribe=onSnapshot(q,s=>{allOrders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));render()},e=>ordersList.innerHTML=`<div class="orders-error">Could not load orders: ${safe(e.message)}</div>`)}
tabs.forEach(tab=>tab.addEventListener("click",()=>{tabs.forEach(x=>x.classList.remove("active"));tab.classList.add("active");activeFilter=tab.dataset.filter;render()}));
onAuthStateChanged(auth,u=>{if(!u){location.href="login.html";return}currentUser=u;listen()});addEventListener("beforeunload",()=>unsubscribe&&unsubscribe());
</script>
</body>
</html>
