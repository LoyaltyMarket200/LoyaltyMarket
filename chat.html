<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - WaterSide</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#0d6e6e">
  <style>
    :root{--brand:#0d6e6e;--brand-dark:#095959;--brand-soft:#e7f5f5;--orange:#ff6b4a;--ink:#172033;--muted:#667085;--line:#e5e7eb;--bg:#f4f6f8;--white:#fff;--danger:#b91c1c;--shadow:0 12px 34px rgba(15,23,42,.09)}
    *{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input,textarea{font:inherit}.hidden{display:none!important}
    .site-header{height:58px;padding:8px max(16px,4vw);background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:20}.brand{display:flex;align-items:center;gap:9px;color:var(--brand);font-weight:800;text-decoration:none}.brand img{width:31px;height:31px;object-fit:contain;border-radius:8px}.header-actions{display:flex;align-items:center;gap:8px}.header-link{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);text-decoration:none;font-size:12.5px;font-weight:700}.header-link.primary{background:var(--orange);border-color:var(--orange);color:#fff}
    .page-shell{width:min(1060px,96%);height:calc(100vh - 86px);margin:14px auto}.chat-card{height:100%;min-height:560px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-rows:auto auto 1fr auto}
    .chat-header{min-height:72px;padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:14px}.chat-person{min-width:0;display:flex;align-items:center;gap:11px}.avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--brand-soft);flex:0 0 auto}.person-copy{min-width:0}.person-name{margin:0;font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.person-status{margin:4px 0 0;color:var(--muted);font-size:11.5px}.chat-header-actions{display:flex;gap:7px;flex-wrap:wrap}.small-action{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;min-height:34px;padding:7px 10px;text-decoration:none;font-size:12px;font-weight:700;cursor:pointer}
    .product-strip{padding:10px 14px;border-bottom:1px solid var(--line);background:#fbfcfd;display:flex;align-items:center;gap:11px}.product-strip img{width:58px;height:48px;border-radius:9px;object-fit:cover;background:#eef2f6}.product-info{min-width:0;flex:1}.product-title{margin:0;font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.product-price{margin:4px 0 0;color:var(--brand);font-size:12px;font-weight:800}.product-view{flex:0 0 auto;padding:7px 10px;border:1px solid var(--brand);border-radius:8px;color:var(--brand);text-decoration:none;font-size:11.5px;font-weight:800}
    .messages{min-height:0;padding:18px;overflow-y:auto;background:linear-gradient(rgba(255,255,255,.9),rgba(255,255,255,.9)),radial-gradient(circle at top left,#e7f5f5 0,transparent 42%),radial-gradient(circle at bottom right,#fff0eb 0,transparent 38%)}.loading,.empty,.error{max-width:520px;margin:30px auto;padding:15px 16px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--muted);text-align:center;font-size:13px}.error{color:var(--danger)}.day-label{width:max-content;margin:10px auto 16px;padding:5px 9px;border-radius:999px;background:#eef2f6;color:var(--muted);font-size:10.5px;font-weight:800}.message-row{margin:7px 0;display:flex}.message-row.mine{justify-content:flex-end}.message-row.theirs{justify-content:flex-start}.bubble{max-width:min(74%,560px);padding:10px 12px 7px;border-radius:15px;line-height:1.45;font-size:13.5px;white-space:pre-wrap;overflow-wrap:anywhere;box-shadow:0 2px 7px rgba(15,23,42,.05)}.mine .bubble{background:var(--brand);color:#fff;border-bottom-right-radius:5px}.theirs .bubble{background:#fff;border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:5px}.message-meta{margin-top:5px;display:flex;justify-content:flex-end;gap:5px;font-size:9.5px;opacity:.78}
    .composer{padding:11px 13px;border-top:1px solid var(--line);background:#fff;display:grid;grid-template-columns:auto 1fr auto;align-items:end;gap:9px}.attach-btn,.send-btn{width:42px;height:42px;border:none;border-radius:11px;display:grid;place-items:center;font-size:18px;font-weight:900;cursor:pointer}.attach-btn{background:#f1f5f9;color:var(--muted)}.attach-btn:disabled{opacity:.5;cursor:not-allowed}.send-btn{background:var(--orange);color:#fff}.send-btn:disabled{opacity:.55;cursor:not-allowed}.message-input{width:100%;min-height:42px;max-height:120px;resize:none;padding:10px 12px;border:1px solid var(--line);border-radius:12px;outline:none;line-height:1.4;overflow-y:auto}.message-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(13,110,110,.08)}.login-note{grid-column:1/-1;padding:10px;border-radius:10px;background:#fff7ed;color:#9a3412;font-size:12px;text-align:center}
    @media(max-width:680px){.site-header{height:auto;flex-wrap:wrap}.header-actions{width:100%;display:grid;grid-template-columns:repeat(3,1fr)}.header-link{text-align:center}.page-shell{width:100%;height:calc(100vh - 105px);margin:0}.chat-card{border-radius:0;border-left:none;border-right:none;min-height:0}.chat-header{padding:10px 12px}.chat-header-actions .small-action:nth-child(n+2){display:none}.messages{padding:13px 10px}.bubble{max-width:86%}.product-strip{padding:8px 10px}.product-strip img{width:50px;height:43px}.composer{padding:9px}}
  
    /* ==========================================================
       WATERSIDE PREMIUM CHAT UI
       Keeps existing Firebase messaging, seen status, product
       preview, notifications and reporting logic.
       ========================================================== */

    body{
      font-family:"Roboto",Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#edf6f6 0,#f4f6f8 260px);
    }

    .site-header{
      min-height:70px;
      height:auto;
      padding:10px max(16px,4vw);
      box-shadow:0 3px 16px rgba(18,39,55,.06);
    }

    .brand{
      font-size:21px;
      letter-spacing:-.3px;
    }

    .brand img{
      width:38px;
      height:38px;
      border-radius:10px;
    }

    .header-link{
      min-height:40px;
      padding:0 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      font-size:13px;
    }

    .page-shell{
      width:min(1180px,96%);
      height:calc(100vh - 96px);
      margin:16px auto 10px;
    }

    .chat-card{
      min-height:620px;
      border-radius:20px;
      border-color:#dfe7ea;
      box-shadow:0 18px 48px rgba(18,39,55,.12);
      grid-template-rows:auto auto 1fr auto;
    }

    .chat-header{
      min-height:86px;
      padding:15px 18px;
      background:#fff;
    }

    .avatar{
      width:52px;
      height:52px;
      border:3px solid #fff;
      box-shadow:0 5px 15px rgba(18,39,55,.12);
    }

    .person-name{
      font-size:17px;
    }

    .person-status{
      font-size:12px;
    }

    .small-action{
      min-height:38px;
      padding:0 12px;
      border-radius:10px;
      font-size:12px;
    }

    .product-strip{
      padding:12px 16px;
      background:#f8fbfb;
    }

    .product-strip img{
      width:68px;
      height:56px;
      border-radius:10px;
    }

    .product-title{
      font-size:14px;
    }

    .product-price{
      font-size:13px;
    }

    .product-view{
      padding:8px 12px;
      border-radius:9px;
      font-size:12px;
    }

    .messages{
      padding:22px;
      background:
        linear-gradient(rgba(255,255,255,.92),rgba(255,255,255,.92)),
        radial-gradient(circle at top left,#dff4f2 0,transparent 45%),
        radial-gradient(circle at bottom right,#fff0eb 0,transparent 40%);
    }

    .day-label{
      margin:12px auto 18px;
      padding:6px 10px;
      font-size:11px;
      background:#e8eef1;
    }

    .message-row{
      margin:9px 0;
    }

    .bubble{
      max-width:min(72%,620px);
      padding:11px 13px 8px;
      border-radius:17px;
      font-size:14px;
      line-height:1.5;
      box-shadow:0 3px 10px rgba(15,23,42,.06);
    }

    .mine .bubble{
      border-bottom-right-radius:6px;
      background:linear-gradient(135deg,#0d6e6e,#0b5f5f);
    }

    .theirs .bubble{
      border-bottom-left-radius:6px;
    }

    .message-meta{
      font-size:10px;
    }

    .composer{
      padding:12px 14px;
      gap:10px;
      background:#fff;
    }

    .attach-btn,
    .send-btn{
      width:46px;
      height:46px;
      border-radius:13px;
    }

    .message-input{
      min-height:46px;
      border-radius:14px;
      padding:12px 14px;
      background:#fbfcfd;
    }

    .typing-indicator{
      display:none;
      padding:6px 14px 0;
      color:var(--muted);
      font-size:11.5px;
      font-style:italic;
    }

    .typing-indicator.show{
      display:block;
    }

    @media(max-width:680px){
      .site-header{
        min-height:62px;
        padding:8px 12px;
      }

      .brand{
        font-size:18px;
      }

      .brand img{
        width:34px;
        height:34px;
      }

      .header-actions{
        width:auto;
        display:flex;
      }

      .header-link{
        min-height:38px;
        padding:0 10px;
        font-size:11.5px;
      }

      .header-link:not(.primary){
        display:none;
      }

      .page-shell{
        width:100%;
        height:calc(100vh - 62px);
        margin:0;
      }

      .chat-card{
        min-height:0;
        border-radius:0;
        border:none;
        box-shadow:none;
      }

      .chat-header{
        min-height:74px;
        padding:10px 12px;
      }

      .avatar{
        width:44px;
        height:44px;
      }

      .person-name{
        font-size:15px;
      }

      .chat-header-actions .small-action:nth-child(n+2){
        display:none;
      }

      .product-strip{
        padding:9px 10px;
      }

      .product-strip img{
        width:54px;
        height:46px;
      }

      .messages{
        padding:14px 10px;
      }

      .bubble{
        max-width:86%;
        font-size:13.5px;
      }

      .composer{
        padding:9px 10px calc(9px + env(safe-area-inset-bottom,0px));
      }

      .attach-btn,
      .send-btn{
        width:42px;
        height:42px;
      }

      .message-input{
        min-height:42px;
      }
    }

  </style>
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html"><img src="icons/icon-512.png" alt="WaterSide"><span>WaterSide</span></a>
  <div class="header-actions"><a class="header-link" href="index.html">Home</a><a class="header-link" href="messages.html">Messages</a><a class="header-link primary" href="sell.html">Post an Ad</a></div>
</header>
<main class="page-shell">
  <section class="chat-card">
    <div class="chat-header">
      <div class="chat-person"><img id="otherAvatar" class="avatar" src="icons/icon-512.png" alt="User"><div class="person-copy"><h1 id="otherName" class="person-name">Loading conversation...</h1><p id="otherStatus" class="person-status">WaterSide member</p></div></div>
      <div class="chat-header-actions"><a id="viewProfileBtn" class="small-action hidden" href="#">View Profile</a><a id="callBtn" class="small-action hidden" href="#">Call</a><button id="reportBtn" class="small-action" type="button">Report</button></div>
    </div>
    <div id="productStrip" class="product-strip hidden"><img id="productImage" src="icons/icon-512.png" alt="Product"><div class="product-info"><p id="productTitle" class="product-title">Product</p><p id="productPrice" class="product-price"></p></div><a id="productViewBtn" class="product-view" href="#">View Ad</a></div>
    <div id="messagesBox" class="messages"><div id="loadingState" class="loading">Loading conversation...</div><div id="emptyState" class="empty hidden">No messages yet. Start the conversation below.</div><div id="errorState" class="error hidden"></div><div id="messageList"></div><div id="typingIndicator" class="typing-indicator">Typing...</div></div>
    <form id="composer" class="composer"><button class="attach-btn" type="button" title="Image sharing will be added next" disabled>＋</button><textarea id="messageInput" class="message-input" rows="1" maxlength="1500" placeholder="Write a message..."></textarea><button id="sendBtn" class="send-btn" type="submit" aria-label="Send message">➤</button><div id="loginNote" class="login-note hidden">Please log in to send messages.</div></form>
  </section>
</main>
<script type="module">
  import { auth, db } from "./firebase.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { addDoc, collection, doc, getDoc, limit, onSnapshot, query, serverTimestamp, setDoc, updateDoc, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const requestedChatId = params.get("chat") || "";
  const requestedOtherId = params.get("with") || params.get("seller") || params.get("user") || "";
  const requestedProductId = params.get("product") || params.get("productId") || "";

  const otherAvatar = document.getElementById("otherAvatar");
  const otherName = document.getElementById("otherName");
  const otherStatus = document.getElementById("otherStatus");
  const viewProfileBtn = document.getElementById("viewProfileBtn");
  const callBtn = document.getElementById("callBtn");
  const reportBtn = document.getElementById("reportBtn");
  const productStrip = document.getElementById("productStrip");
  const productImage = document.getElementById("productImage");
  const productTitle = document.getElementById("productTitle");
  const productPrice = document.getElementById("productPrice");
  const productViewBtn = document.getElementById("productViewBtn");
  const messagesBox = document.getElementById("messagesBox");
  const messageList = document.getElementById("messageList");
  const loadingState = document.getElementById("loadingState");
  const emptyState = document.getElementById("emptyState");
  const errorState = document.getElementById("errorState");
  const composer = document.getElementById("composer");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const loginNote = document.getElementById("loginNote");

  let currentUser = null;
  let otherUserId = requestedOtherId;
  let productId = requestedProductId;
  let chatId = requestedChatId;
  let unsubscribeMessages = null;
  let firstSnapshotRendered = false;

  function safeString(value, fallback = "") { return value === null || value === undefined ? fallback : String(value); }
  function normalizePhone(value) { return safeString(value).replace(/[^\d+]/g, ""); }
  function timestampDate(value) { if (!value) return null; if (typeof value.toDate === "function") return value.toDate(); if (typeof value.seconds === "number") return new Date(value.seconds * 1000); const parsed = new Date(value); return Number.isNaN(parsed.getTime()) ? null : parsed; }
  function formatTime(value) { const date = timestampDate(value); return date ? date.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" }) : "Sending..."; }
  function formatDay(value) { const date = timestampDate(value); if (!date) return ""; const today = new Date(); const yesterday = new Date(); yesterday.setDate(today.getDate() - 1); if (date.toDateString() === today.toDateString()) return "Today"; if (date.toDateString() === yesterday.toDateString()) return "Yesterday"; return date.toLocaleDateString([], { month:"short", day:"numeric", year:date.getFullYear() !== today.getFullYear() ? "numeric" : undefined }); }
  function priceText(product) { const parts=[]; const usd=Number(product?.priceUsd ?? product?.priceUSD ?? 0); const lrd=Number(product?.priceLrd ?? product?.priceLRD ?? product?.priceLd ?? 0); if (usd>0) parts.push(`US$${usd.toLocaleString()}`); if (lrd>0) parts.push(`L$${lrd.toLocaleString()}`); return parts.join(" | ") || "Contact seller"; }
  function productPhoto(product) { return Array.isArray(product?.images) && product.images.length ? product.images[0] : (product?.imageUrl || product?.imageURL || product?.image || "icons/icon-512.png"); }
  function deterministicChatId(userA,userB,itemId="") { const participants=[userA,userB].sort(); return `${participants[0]}_${participants[1]}_${itemId || "general"}`; }
  function showError(message) { loadingState.classList.add("hidden"); emptyState.classList.add("hidden"); errorState.textContent=message; errorState.classList.remove("hidden"); }
  function autoGrowInput() { messageInput.style.height="auto"; messageInput.style.height=Math.min(messageInput.scrollHeight,120)+"px"; }
  function scrollToBottom(force=false) { const nearBottom=messagesBox.scrollHeight-messagesBox.scrollTop-messagesBox.clientHeight<120; if (force || nearBottom) requestAnimationFrame(()=>{ messagesBox.scrollTop=messagesBox.scrollHeight; }); }

  async function loadChatFromId() {
    if (!chatId) return;
    const chatSnap=await getDoc(doc(db,"chats",chatId));
    if (!chatSnap.exists()) throw new Error("This conversation could not be found.");
    const chatData=chatSnap.data();
    const participants=Array.isArray(chatData.participants)?chatData.participants:[];
    if (!participants.includes(currentUser.uid)) throw new Error("You do not have permission to open this conversation.");
    otherUserId=participants.find(id=>id!==currentUser.uid)||"";
    productId=chatData.productId||"";
  }

  async function loadOtherUser() {
    if (!otherUserId) throw new Error("No other user was selected for this conversation.");
    const userSnap=await getDoc(doc(db,"users",otherUserId));
    if (!userSnap.exists()) throw new Error("The other user's profile could not be found.");
    const data=userSnap.data();
    otherName.textContent=data.resellerName||data.businessName||data.name||data.email||"WaterSide User";
    otherStatus.textContent=data.resellerApproved===true?"Authorized WaterSide Reseller":data.businessVerified===true?"Verified WaterSide Business":data.verified===true?"Verified WaterSide Seller":"WaterSide member";
    otherAvatar.src=data.resellerPhotoUrl||data.profilePhotoUrl||data.photoURL||data.avatarUrl||data.profileImageUrl||"icons/icon-512.png";
    otherAvatar.onerror=()=>{ otherAvatar.src="icons/icon-512.png"; };
    const phone=data.resellerPhone||data.businessPhone||data.phone||"";
    if (phone) { callBtn.href=`tel:${normalizePhone(phone)}`; callBtn.classList.remove("hidden"); }
    if (data.accountType==="reseller"||data.resellerApproved===true||data.isReseller===true) { viewProfileBtn.href=`reseller-profile.html?id=${encodeURIComponent(otherUserId)}`; viewProfileBtn.classList.remove("hidden"); }
    else if (data.accountType==="business") { viewProfileBtn.href=`business-profile.html?id=${encodeURIComponent(otherUserId)}`; viewProfileBtn.classList.remove("hidden"); }
  }

  async function loadProduct() {
    if (!productId) { productStrip.classList.add("hidden"); return; }
    const productSnap=await getDoc(doc(db,"products",productId));
    if (!productSnap.exists()) { productStrip.classList.add("hidden"); return; }
    const product=productSnap.data();
    productTitle.textContent=product.title||"Marketplace listing";
    productPrice.textContent=priceText(product);
    productImage.src=productPhoto(product);
    productImage.onerror=()=>{ productImage.src="icons/icon-512.png"; };
    productViewBtn.href=`product-detail.html?id=${encodeURIComponent(productId)}`;
    productStrip.classList.remove("hidden");
  }

  // FIXED: this function now handles the case where the chat doc doesn't
  // exist yet. Firestore returns "permission-denied" (not "not found")
  // when reading a brand-new doc under these rules, so we must catch
  // that specific error and create the chat instead of giving up.
  async function ensureChatDocument() {
    if (!chatId) chatId=deterministicChatId(currentUser.uid,otherUserId,productId);
    let chatRef=doc(db,"chats",chatId);
    const newChatData={participants:[currentUser.uid,otherUserId],productId:productId||"",lastMessage:"",lastMessageTime:serverTimestamp(),lastSenderId:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp()};

    try {
      const chatSnap=await getDoc(chatRef);
      if (!chatSnap.exists()) {
        await setDoc(chatRef,newChatData);
      } else {
        const existingData=chatSnap.data();
        const existingParticipants=Array.isArray(existingData.participants)?existingData.participants:[];
        const validExistingChat=existingParticipants.includes(currentUser.uid)&&existingParticipants.includes(otherUserId);
        if (!validExistingChat) {
          chatRef=doc(collection(db,"chats"));
          chatId=chatRef.id;
          await setDoc(chatRef,newChatData);
        }
      }
    } catch (chatError) {
      if (chatError?.code==="permission-denied") {
        chatRef=doc(collection(db,"chats"));
        chatId=chatRef.id;
        await setDoc(chatRef,newChatData);
      } else {
        throw chatError;
      }
    }

    const url=new URL(window.location.href); url.searchParams.set("chat",chatId); url.searchParams.delete("with"); url.searchParams.delete("seller"); url.searchParams.delete("user"); if (productId) url.searchParams.set("product",productId); window.history.replaceState({},"",url);
  }

  async function markIncomingMessagesSeen(messages) {
    const unread=messages.filter(message=>message.receiverId===currentUser.uid&&message.read!==true);
    if (!unread.length) return;
    const batch=writeBatch(db);
    unread.forEach(message=>batch.update(doc(db,"messages",message.id),{read:true,readAt:serverTimestamp()}));
    await batch.commit();
  }

  function renderMessages(messages) {
    loadingState.classList.add("hidden"); errorState.classList.add("hidden"); emptyState.classList.toggle("hidden",messages.length>0); messageList.innerHTML="";
    let currentDay="";
    messages.forEach(message=>{
      const day=formatDay(message.createdAt);
      if (day&&day!==currentDay) { currentDay=day; const label=document.createElement("div"); label.className="day-label"; label.textContent=day; messageList.appendChild(label); }
      const mine=message.senderId===currentUser.uid;
      const row=document.createElement("div"); row.className=`message-row ${mine?"mine":"theirs"}`;
      const bubble=document.createElement("div"); bubble.className="bubble";
      const body=document.createElement("div"); body.textContent=message.text||"";
      const meta=document.createElement("div"); meta.className="message-meta";
      const time=document.createElement("span"); time.textContent=formatTime(message.createdAt); meta.appendChild(time);
      if (mine) { const status=document.createElement("span"); status.textContent=message.read===true?"✓✓ Seen":"✓ Sent"; meta.appendChild(status); }
      bubble.append(body,meta); row.appendChild(bubble); messageList.appendChild(row);
    });
    scrollToBottom(!firstSnapshotRendered); firstSnapshotRendered=true;
    markIncomingMessagesSeen(messages).catch(error=>console.warn("Could not mark messages as seen:",error));
  }

  function listenForMessages() {
    if (unsubscribeMessages) unsubscribeMessages();
    const messagesQuery=query(
      collection(db,"messages"),
      where("participants","array-contains",currentUser.uid),
      limit(500)
    );
    unsubscribeMessages=onSnapshot(messagesQuery,snapshot=>{
      const messages=snapshot.docs
        .map(d=>({id:d.id,...d.data()}))
        .filter(message=>message.chatId===chatId)
        .sort((a,b)=>(timestampDate(a.createdAt)?.getTime()||0)-(timestampDate(b.createdAt)?.getTime()||0));
      renderMessages(messages);
    },error=>{ console.error("Could not load messages:",error); showError("Could not load this conversation. Check your Firestore rules."); });
  }

  async function sendMessage() {
    const text=messageInput.value.trim();
    if (!text||!currentUser||!chatId||!otherUserId) return;
    sendBtn.disabled=true;
    try {
      await addDoc(collection(db,"messages"),{
        chatId,
        productId:productId||"",
        senderId:currentUser.uid,
        receiverId:otherUserId,
        participants:[currentUser.uid,otherUserId],
        text,
        type:"text",
        read:false,
        createdAt:serverTimestamp()
      });

      await updateDoc(doc(db,"chats",chatId),{
        lastMessage:text,
        lastMessageTime:serverTimestamp(),
        lastSenderId:currentUser.uid,
        updatedAt:serverTimestamp()
      });

      // Create a WaterSide notification for the receiver.
      // A failed notification must never stop the message itself.
      try {
        const senderSnap = await getDoc(doc(db,"users",currentUser.uid));
        const senderData = senderSnap.exists() ? senderSnap.data() : {};
        const senderName =
          senderData.resellerName
          || senderData.businessName
          || senderData.name
          || currentUser.displayName
          || currentUser.email
          || "A WaterSide user";

        await addDoc(collection(db,"notifications"),{
          userId:otherUserId,
          type:"message",
          title:`New message from ${senderName}`,
          body:text.length > 90 ? `${text.slice(0,87)}...` : text,
          link:`chat.html?chat=${encodeURIComponent(chatId)}`,
          chatId,
          productId:productId||"",
          senderId:currentUser.uid,
          read:false,
          createdAt:serverTimestamp()
        });
      } catch(notificationError) {
        console.warn("Message sent, but notification could not be created:",notificationError);
      }

      messageInput.value="";
      autoGrowInput();
      scrollToBottom(true);
    } catch(error) { console.error("Could not send message:",error); alert("Could not send your message. Check your internet connection and Firestore permissions."); }
    finally { sendBtn.disabled=false; messageInput.focus(); }
  }

  async function startChat() {
    loadingState.classList.remove("hidden");
    try {
      if (requestedChatId) await loadChatFromId();
      if (!otherUserId) throw new Error("No user was selected. Open chat.html?with=USER_ID&product=PRODUCT_ID.");
      if (otherUserId===currentUser.uid) throw new Error("You cannot start a conversation with yourself.");
      await Promise.all([loadOtherUser(),loadProduct()]);
      await ensureChatDocument();
      listenForMessages();
    } catch(error) { console.error("Could not start chat:",error); showError(error.message); }
  }

  composer.addEventListener("submit",async event=>{ event.preventDefault(); await sendMessage(); });
  messageInput.addEventListener("input",autoGrowInput);
  messageInput.addEventListener("keydown",async event=>{ if (event.key==="Enter"&&!event.shiftKey) { event.preventDefault(); await sendMessage(); } });
  reportBtn.addEventListener("click",()=>{ if (!otherUserId) return; window.location.href=`report.html?user=${encodeURIComponent(otherUserId)}${productId?`&product=${encodeURIComponent(productId)}`:""}`; });
  onAuthStateChanged(auth,async user=>{ currentUser=user; if (!user) { loadingState.classList.add("hidden"); loginNote.classList.remove("hidden"); messageInput.disabled=true; sendBtn.disabled=true; otherName.textContent="Please log in"; otherStatus.textContent="Log in to open this conversation"; return; } loginNote.classList.add("hidden"); messageInput.disabled=false; sendBtn.disabled=false; await startChat(); });
  window.addEventListener("beforeunload",()=>{ if (unsubscribeMessages) unsubscribeMessages(); });
</script>
</body>
</html>
