<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Sales - LoyaltyMarket</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#1e3a8a">
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#0f172a}
    .sales-navbar{min-height:78px;height:auto;padding:12px max(24px,5vw);background:#fff;border-bottom:1px solid #e5e7eb;box-shadow:0 4px 20px rgba(15,23,42,.06);justify-content:space-between;position:sticky;top:0;z-index:40}
    .sales-navbar .logo-link img{width:48px;height:48px;object-fit:contain}.sales-navbar .logo-text{color:#0f2d67;font-size:21px}.sales-nav-actions{display:flex;gap:10px}.sales-nav-link,.sales-post-link{min-height:42px;display:inline-flex;align-items:center;justify-content:center;padding:10px 16px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:800;border:1px solid transparent}.sales-nav-link{color:#334155;background:#f8fafc;border-color:#e2e8f0}.sales-post-link{color:#fff;background:#f97316}
    .sales-page{width:min(1180px,94%);margin:32px auto 70px}.sales-hero{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:32px;border-radius:24px;color:#fff;background:linear-gradient(135deg,#0f2d67,#1d4ed8);box-shadow:0 18px 42px rgba(30,58,138,.2)}.sales-kicker{margin:0 0 8px;color:#fbbf24;font-size:12px;font-weight:900;letter-spacing:.16em}.sales-hero h1{margin:0 0 8px;font-size:clamp(32px,5vw,48px)}.sales-hero p{margin:0;color:#dbeafe}.sales-summary{min-width:165px;padding:20px;border:1px solid rgba(255,255,255,.18);border-radius:18px;background:rgba(255,255,255,.10);text-align:center}.sales-summary strong{display:block;font-size:30px}
    .sales-panel{margin-top:24px;padding:24px;border:1px solid #e2e8f0;border-radius:22px;background:#fff;box-shadow:0 14px 34px rgba(15,23,42,.07)}.sales-tabs{display:flex;gap:9px;flex-wrap:wrap;margin:0 0 20px}.sales-tab{background:#fff;border:1px solid #d1d5db;padding:9px 16px;border-radius:999px;font-size:14px;font-weight:800;cursor:pointer}.sales-tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
    .sales-list{display:grid;gap:14px}.sale-card{display:grid;grid-template-columns:92px minmax(0,1fr) auto;gap:16px;align-items:center;border:1px solid #e2e8f0;border-radius:16px;padding:14px}.sale-card img{width:92px;height:92px;object-fit:cover;border-radius:12px}.sale-info h4{margin:0 0 7px}.sale-price{margin:0 0 7px;color:#ea580c;font-weight:900}.sale-meta{display:block;color:#64748b;font-size:12px;margin-top:3px}.sale-side{display:flex;flex-direction:column;align-items:flex-end;gap:10px}.sale-status{font-size:12px;font-weight:900;padding:7px 11px;border-radius:999px;text-transform:capitalize}.pending{background:#fef3c7;color:#92400e}.confirmed{background:#dbeafe;color:#1e40af}.completed{background:#d1fae5;color:#065f46}.cancelled{background:#fee2e2;color:#991b1b}
    .sale-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.sale-action-btn,.sale-message-link{border:none;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;text-decoration:none}.confirm-btn{background:#2563eb;color:#fff}.complete-btn{background:#059669;color:#fff}.cancel-btn{background:#fff;border:1px solid #dc2626;color:#dc2626}.sale-message-link{background:#0f172a;color:#fff}
    .sales-empty,.sales-error{padding:48px 24px;text-align:center;border-radius:18px}.sales-empty{border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b}.sales-error{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}.sales-footer{display:flex;justify-content:space-between;align-items:center;padding:30px max(24px,6vw)}
    @media(max-width:820px){.sales-nav-actions{width:100%;display:grid;grid-template-columns:repeat(4,1fr)}.sales-hero{flex-direction:column;align-items:flex-start}.sales-summary{width:100%}.sale-card{grid-template-columns:76px minmax(0,1fr)}.sale-card img{width:76px;height:76px}.sale-side{grid-column:2;align-items:flex-start}}@media(max-width:560px){.sales-nav-actions{grid-template-columns:1fr}.sale-card{grid-template-columns:1fr}.sale-card img{width:100%;height:220px}.sale-side{grid-column:auto}.sales-footer{flex-direction:column;text-align:center}}
  </style>
</head>
<body>
<header class="navbar sales-navbar"><div class="logo"><a href="index.html" class="logo-link"><img src="icons/icon-512.png" alt="LoyaltyMarket"><span class="logo-text"><span class="lr-tag">LR</span>LoyaltyMarket</span></a></div><div class="sales-nav-actions"><a href="index.html" class="sales-nav-link">Home</a><a href="messages.html" class="sales-nav-link">Messages</a><a href="dashboard.html" class="sales-nav-link">Dashboard</a><a href="sell.html" class="sales-post-link">Post An Ad</a></div></header>
<main class="sales-page">
  <section class="sales-hero"><div><p class="sales-kicker">SELLER CENTER</p><h1>My Sales</h1><p>Confirm, complete, cancel, and message buyers.</p></div><div class="sales-summary"><strong id="salesCount">0</strong><span>Total Sales</span></div></section>
  <section class="sales-panel"><div class="sales-tabs"><button class="sales-tab active" data-filter="all">All</button><button class="sales-tab" data-filter="pending">Pending</button><button class="sales-tab" data-filter="confirmed">Confirmed</button><button class="sales-tab" data-filter="completed">Completed</button><button class="sales-tab" data-filter="cancelled">Cancelled</button></div><div id="ordersList" class="sales-list"><div class="sales-empty"><h3>Loading your sales...</h3></div></div></section>
</main>
<footer class="footer sales-footer"><div><h2>🇱🇷 LoyaltyMarket</h2><p>You Get Market, We Get Buyer.</p></div><p>&copy; 2026 LoyaltyMarket. All Rights Reserved.</p></footer>
<script type="module">
import {db,auth} from "./firebase.js";
import {collection,query,where,onSnapshot,doc,updateDoc,addDoc,serverTimestamp} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import {onAuthStateChanged} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
const ordersList=document.getElementById("ordersList"),salesCount=document.getElementById("salesCount"),tabs=document.querySelectorAll(".sales-tab");
let currentUser=null,allOrders=[],activeFilter="all",unsubscribe=null;
const safe=v=>String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
function formatDate(t){if(!t)return"Date unavailable";const d=typeof t.toDate==="function"?t.toDate():new Date(t.seconds?t.seconds*1000:t);return Number.isNaN(d.getTime())?"Date unavailable":d.toLocaleString([],{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"})}
function buttons(o){
  const s=(o.status||"pending").toLowerCase(),chat="chat.html?product="+encodeURIComponent(o.productId||"")+"&user="+encodeURIComponent(o.buyerId||"");
  let html=`<a class="sale-message-link" href="${chat}">Message Buyer</a>`;
  if(s==="pending")html+=`<button class="sale-action-btn confirm-btn" data-id="${o.id}" data-status="confirmed">Confirm</button><button class="sale-action-btn cancel-btn" data-id="${o.id}" data-status="cancelled">Cancel</button>`;
  if(s==="confirmed")html+=`<button class="sale-action-btn complete-btn" data-id="${o.id}" data-status="completed">Mark Completed</button><button class="sale-action-btn cancel-btn" data-id="${o.id}" data-status="cancelled">Cancel</button>`;
  return html;
}
async function updateStatus(order,newStatus){
  const label={confirmed:"confirm",completed:"complete",cancelled:"cancel"}[newStatus]||"update";
  if(!confirm(`Are you sure you want to ${label} this order?`))return;
  try{
    const payload={status:newStatus,updatedAt:serverTimestamp()};
    if(newStatus==="confirmed")payload.confirmedAt=serverTimestamp();
    if(newStatus==="completed")payload.completedAt=serverTimestamp();
    if(newStatus==="cancelled"){payload.cancelledAt=serverTimestamp();payload.cancelledBy="seller"}
    await updateDoc(doc(db,"orders",order.id),payload);
    await addDoc(collection(db,"notifications"),{userId:order.buyerId,type:"order",title:`Order ${newStatus}`,body:(order.productTitle||"Your order")+" is now "+newStatus+".",link:"orders.html",read:false,createdAt:serverTimestamp()}).catch(()=>{});
  }catch(e){alert("Could not update order: "+e.message)}
}
function render(){
  const rows=activeFilter==="all"?allOrders:allOrders.filter(o=>(o.status||"pending").toLowerCase()===activeFilter);
  salesCount.textContent=String(allOrders.length);
  if(!rows.length){ordersList.innerHTML='<div class="sales-empty"><h3>No sales found</h3><p>No buyer orders are available in this category.</p></div>';return}
  ordersList.innerHTML=rows.map(o=>{const s=(o.status||"pending").toLowerCase(),img=o.productImage||"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&h=200&fit=crop";return `<article class="sale-card"><img src="${safe(img)}" alt="${safe(o.productTitle||"Product")}"><div class="sale-info"><h4>${safe(o.productTitle||"Untitled Product")}</h4><p class="sale-price">US$${safe(o.priceUsd||"0")} | L$${safe(o.priceLrd||"0")}</p><span class="sale-meta">Buyer: ${safe(o.buyerEmail||"Unknown")}</span><span class="sale-meta">Ordered ${safe(formatDate(o.createdAt))}</span>${o.updatedAt?`<span class="sale-meta">Updated ${safe(formatDate(o.updatedAt))}</span>`:""}</div><div class="sale-side"><span class="sale-status ${safe(s)}">${safe(s)}</span><div class="sale-actions">${buttons(o)}</div></div></article>`}).join("");
  document.querySelectorAll(".sale-action-btn").forEach(btn=>btn.addEventListener("click",()=>{const o=allOrders.find(x=>x.id===btn.dataset.id);if(o)updateStatus(o,btn.dataset.status)}));
}
function listen(){const q=query(collection(db,"orders"),where("sellerId","==",currentUser.uid));unsubscribe=onSnapshot(q,s=>{allOrders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));render()},e=>ordersList.innerHTML=`<div class="sales-error">Could not load sales: ${safe(e.message)}</div>`)}
tabs.forEach(tab=>tab.addEventListener("click",()=>{tabs.forEach(x=>x.classList.remove("active"));tab.classList.add("active");activeFilter=tab.dataset.filter;render()}));
onAuthStateChanged(auth,u=>{if(!u){location.href="login.html";return}currentUser=u;listen()});addEventListener("beforeunload",()=>unsubscribe&&unsubscribe());
</script>
</body>
</html>
