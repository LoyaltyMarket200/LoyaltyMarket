<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Sales - LoyaltyMarket</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#1e3a8a">
  <style>
    .orders-wrap {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 16px;
    }
    .orders-header h1 {
      margin: 0 0 4px 0;
    }
    .orders-header p {
      color: #6b7280;
      margin: 0 0 20px 0;
    }
    .orders-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .orders-tab {
      background: #fff;
      border: 1px solid #d1d5db;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #374151;
    }
    .orders-tab.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .order-card {
      display: flex;
      gap: 14px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .order-card img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .order-info {
      flex: 1;
      min-width: 180px;
    }
    .order-info h4 {
      margin: 0 0 4px 0;
      font-size: 15px;
      color: #111;
    }
    .order-info p {
      margin: 0 0 4px 0;
      font-size: 13px;
      color: #059669;
      font-weight: 600;
    }
    .order-buyer {
      font-size: 12px;
      color: #6b7280;
    }
    .order-date {
      font-size: 12px;
      color: #9ca3af;
    }
    .order-status {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      text-transform: capitalize;
      white-space: nowrap;
    }
    .order-status.pending {
      background: #fef3c7;
      color: #92400e;
    }
    .order-status.confirmed {
      background: #dbeafe;
      color: #1e40af;
    }
    .order-status.completed {
      background: #d1fae5;
      color: #065f46;
    }
    .order-status.cancelled {
      background: #fee2e2;
      color: #991b1b;
    }
    .order-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .order-action-btn {
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .order-action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .confirm-btn {
      background: #2563eb;
      color: #fff;
    }
    .complete-btn {
      background: #059669;
      color: #fff;
    }
    .cancel-btn {
      background: #fff;
      border: 1px solid #dc2626;
      color: #dc2626;
    }
    .orders-empty {
      text-align: center;
      color: #888;
      margin-top: 60px;
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <h2>🇱🇷 LoyaltyMarket</h2>
  </div>

  <input type="text" class="search-box" placeholder="Search Products, Cars, Phones...">

  <a href="index.html" class="login-btn">Home</a>
  <a href="messages.html" class="register-btn">My Messages</a>
  <a href="dashboard.html" class="register-btn">Dashboard</a>
</header>

<div class="orders-wrap">

  <div class="orders-header">
    <h1>💰 My Sales</h1>
    <p>Orders buyers have placed on your listings.</p>
  </div>

  <div class="orders-tabs">
    <button class="orders-tab active" data-filter="all">All</button>
    <button class="orders-tab" data-filter="pending">Pending</button>
    <button class="orders-tab" data-filter="confirmed">Confirmed</button>
    <button class="orders-tab" data-filter="completed">Completed</button>
    <button class="orders-tab" data-filter="cancelled">Cancelled</button>
  </div>

  <div id="ordersList">
    <p>Loading your sales...</p>
  </div>

</div>

<footer class="footer">
  <h2>🇱🇷 LoyaltyMarket</h2>
  <p>Buy And Sell Products Across Liberia.</p>
  <p>&copy; 2026 LoyaltyMarket. All Rights Reserved.</p>
</footer>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  collection,
  query,
  where,
  orderBy,
  onSnapshot,
  doc,
  updateDoc,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const ordersList = document.getElementById("ordersList");
const tabs = document.querySelectorAll(".orders-tab");

let currentUser = null;
let allOrders = [];
let activeFilter = "all";

function safeText(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(timestamp) {
  if (!timestamp || !timestamp.toDate) {
    return "";
  }
  return timestamp.toDate().toLocaleString([], {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function actionButtonsFor(order) {
  const status = order.status || "pending";
  const buttons = [];

  if (status === "pending") {
    buttons.push(`<button class="order-action-btn confirm-btn" data-id="${order.id}" data-status="confirmed">Confirm</button>`);
    buttons.push(`<button class="order-action-btn cancel-btn" data-id="${order.id}" data-status="cancelled">Cancel</button>`);
  } else if (status === "confirmed") {
    buttons.push(`<button class="order-action-btn complete-btn" data-id="${order.id}" data-status="completed">Mark Completed</button>`);
    buttons.push(`<button class="order-action-btn cancel-btn" data-id="${order.id}" data-status="cancelled">Cancel</button>`);
  }

  return buttons.join("");
}

function renderOrders() {
  const filtered = activeFilter === "all"
    ? allOrders
    : allOrders.filter((order) => (order.status || "pending") === activeFilter);

  if (filtered.length === 0) {
    ordersList.innerHTML = `
      <div class="orders-empty">
        <p>No sales found.</p>
      </div>
    `;
    return;
  }

  ordersList.innerHTML = filtered
    .map((order) => {
      const status = order.status || "pending";
      const image =
        order.productImage ||
        "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&h=100&fit=crop";

      return `
        <div class="order-card">
          <img src="${safeText(image)}" alt="${safeText(order.productTitle || "Product")}">
          <div class="order-info">
            <h4>${safeText(order.productTitle || "Untitled Product")}</h4>
            <p>US$${safeText(order.priceUsd || "0")} | L$${safeText(order.priceLrd || "0")}</p>
            <span class="order-buyer">Buyer: ${safeText(order.buyerEmail || "Unknown")}</span><br>
            <span class="order-date">${formatDate(order.createdAt)}</span>
          </div>
          <span class="order-status ${safeText(status)}">${safeText(status)}</span>
          <div class="order-actions">
            ${actionButtonsFor(order)}
          </div>
        </div>
      `;
    })
    .join("");

  document.querySelectorAll(".order-action-btn").forEach((button) => {
    button.addEventListener("click", async () => {
      const orderId = button.getAttribute("data-id");
      const newStatus = button.getAttribute("data-status");
      const order = allOrders.find((o) => o.id === orderId);

      const actionLabel = button.textContent;
      button.disabled = true;
      button.textContent = "Updating...";

      try {
        await updateDoc(doc(db, "orders", orderId), {
          status: newStatus
        });

        if (order && order.buyerId) {
          try {
            const statusMessages = {
              confirmed: "Your order was confirmed",
              completed: "Your order was completed",
              cancelled: "Your order was cancelled"
            };

            await addDoc(collection(db, "notifications"), {
              userId: order.buyerId,
              type: "order",
              title: statusMessages[newStatus] || "Order status updated",
              body: (order.productTitle || "Your item") + " is now " + newStatus,
              link: "orders.html",
              read: false,
              createdAt: serverTimestamp()
            });
          } catch (notifyError) {
            // Notification is a nice-to-have; don't block the status
            // update from succeeding if the notification write fails.
          }
        }

      } catch (error) {
        alert("Could not update order: " + error.message);
        button.disabled = false;
        button.textContent = actionLabel;
      }
    });
  });
}

function listenForSales() {
  const salesQuery = query(
    collection(db, "orders"),
    where("sellerId", "==", currentUser.uid),
    orderBy("createdAt", "desc")
  );

  onSnapshot(salesQuery, (snapshot) => {
    allOrders = snapshot.docs.map((docSnap) => ({ id: docSnap.id, ...docSnap.data() }));
    renderOrders();
  }, (error) => {
    ordersList.innerHTML = `<p>Could not load sales: ${safeText(error.message)}</p>`;
  });
}

tabs.forEach((tab) => {
  tab.addEventListener("click", () => {
    tabs.forEach((t) => t.classList.remove("active"));
    tab.classList.add("active");
    activeFilter = tab.getAttribute("data-filter");
    renderOrders();
  });
});

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
  listenForSales();
});
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service worker registered'))
      .catch((error) => console.log('Service worker registration failed:', error));
  }
</script>

</body>
</html>
