<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Messages - LoyaltyMarket</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#1e3a8a">

  <style>
    .inbox-wrap {
      max-width: 700px;
      margin: 20px auto;
      padding: 0 16px;
    }

    .inbox-wrap h1 {
      color: #111;
      margin-bottom: 4px;
    }

    .inbox-subtitle {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .conversation-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
    }

    .conversation-card:hover {
      border-color: #2563eb;
    }

    .conversation-card img {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .conversation-info {
      flex: 1;
      min-width: 0;
    }

    .conversation-info h4 {
      margin: 0 0 2px 0;
      font-size: 15px;
      color: #111;
    }

    .conversation-last-message {
      margin: 0;
      font-size: 13px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-time {
      font-size: 12px;
      color: #999;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .inbox-empty-state {
      text-align: center;
      color: #888;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 40px 20px;
    }
  </style>
</head>

<body>

<header class="navbar">
  <input
    type="text"
    class="search-box"
    placeholder="Search Products, Cars, Phones..."
  >

  <div class="nav-buttons">
    <a href="index.html" class="login-btn">Home</a>
    <a href="dashboard.html" class="register-btn">Dashboard</a>
  </div>
</header>

<div class="inbox-wrap">
  <h1>My Messages</h1>
  <p class="inbox-subtitle">Conversations with buyers and sellers.</p>

  <div id="conversationsList">
    <p style="text-align:center; color:#888;">Loading conversations...</p>
  </div>
</div>

<footer class="footer">
  <h2>🇱🇷 LoyaltyMarket</h2>
  <p>Buy And Sell Products Across Liberia.</p>
  <p>&copy; 2026 LoyaltyMarket. All Rights Reserved.</p>
</footer>

<script type="module">
import { db, auth } from "./firebase.js";

import {
  collection,
  query,
  where,
  getDocs,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const conversationsList = document.getElementById("conversationsList");

let currentUser = null;

function safeText(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function timestampToMilliseconds(timestamp) {
  if (!timestamp) return 0;

  if (typeof timestamp.toMillis === "function") {
    return timestamp.toMillis();
  }

  if (typeof timestamp.seconds === "number") {
    return timestamp.seconds * 1000;
  }

  const date = new Date(timestamp);
  return Number.isNaN(date.getTime()) ? 0 : date.getTime();
}

function formatTime(timestamp) {
  const milliseconds = timestampToMilliseconds(timestamp);

  if (!milliseconds) {
    return "";
  }

  return new Date(milliseconds).toLocaleDateString([], {
    month: "short",
    day: "numeric"
  });
}

function getConversationKey(message) {
  if (message.chatId) {
    return message.chatId;
  }

  return [
    message.productId || "unknown-product",
    message.senderId || "unknown-sender",
    message.receiverId || "unknown-receiver"
  ].sort().join("_");
}

async function loadConversations() {
  conversationsList.innerHTML =
    '<p style="text-align:center; color:#888;">Loading conversations...</p>';

  try {
    /*
      IMPORTANT:
      Firestore rules allow a signed-in user to read a message when their UID
      exists in the message's participants array.

      Therefore the query must also use participants array-contains.
      A senderId-only query cannot be proven safe by Firestore and is denied.
    */
    const conversationsQuery = query(
      collection(db, "messages"),
      where("participants", "array-contains", currentUser.uid)
    );

    const messagesSnapshot = await getDocs(conversationsQuery);

    const allMessages = messagesSnapshot.docs.map((docSnap) => ({
      id: docSnap.id,
      ...docSnap.data()
    }));

    if (allMessages.length === 0) {
      conversationsList.innerHTML = `
        <div class="inbox-empty-state">
          <h3>No conversations yet</h3>
          <p style="margin-top:8px;">
            When you message a seller or someone messages you about a listing,
            it will show up here.
          </p>
        </div>
      `;
      return;
    }

    const conversationsByChatId = {};

    allMessages.forEach((message) => {
      const conversationKey = getConversationKey(message);
      const existing = conversationsByChatId[conversationKey];

      const messageTime = timestampToMilliseconds(message.createdAt);
      const existingTime = timestampToMilliseconds(existing?.createdAt);

      if (!existing || messageTime > existingTime) {
        conversationsByChatId[conversationKey] = message;
      }
    });

    const conversations = Object.values(conversationsByChatId).sort(
      (a, b) =>
        timestampToMilliseconds(b.createdAt) -
        timestampToMilliseconds(a.createdAt)
    );

    conversationsList.innerHTML = "";

    for (const conversation of conversations) {
      const otherUserId =
        conversation.senderId === currentUser.uid
          ? conversation.receiverId
          : conversation.senderId;

      let productTitle = "Untitled Listing";
      let productImage =
        "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=100&h=100&fit=crop";

      if (conversation.productId) {
        try {
          const productSnap = await getDoc(
            doc(db, "products", conversation.productId)
          );

          if (productSnap.exists()) {
            const product = productSnap.data();

            const productImages =
              Array.isArray(product.images) && product.images.length > 0
                ? product.images
                : [];

            productTitle = product.title || productTitle;
            productImage =
              productImages[0] ||
              product.imageUrl ||
              product.imageURL ||
              product.image ||
              product.mainImage ||
              productImage;
          }
        } catch (error) {
          console.warn("Could not load product for conversation:", error);
        }
      }

      const card = document.createElement("a");
      card.className = "conversation-card";

      card.href =
        "chat.html?product=" +
        encodeURIComponent(conversation.productId || "") +
        "&seller=" +
        encodeURIComponent(otherUserId || "");

      card.innerHTML = `
        <img src="${safeText(productImage)}" alt="${safeText(productTitle)}">

        <div class="conversation-info">
          <h4>${safeText(productTitle)}</h4>
          <p class="conversation-last-message">
            ${safeText(conversation.text || "No message text")}
          </p>
        </div>

        <span class="conversation-time">
          ${formatTime(conversation.createdAt)}
        </span>
      `;

      conversationsList.appendChild(card);
    }

  } catch (error) {
    console.error("Could not load conversations:", error);

    conversationsList.innerHTML = `
      <div class="inbox-empty-state">
        <h3>Could not load conversations</h3>
        <p style="margin-top:8px;">${safeText(error.message)}</p>
      </div>
    `;
  }
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
  loadConversations();
});
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker
      .register("service-worker.js")
      .then(() => console.log("Service worker registered"))
      .catch((error) =>
        console.log("Service worker registration failed:", error)
      );
  }
</script>

</body>
</html>
