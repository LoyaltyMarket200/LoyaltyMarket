<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product - LoyaltyMarket</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <meta name="theme-color" content="#1e3a8a">
  <style>
    .image-preview-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
    .image-preview-box {
      width: 70px;
      height: 70px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #d1d5db;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .image-preview-box.empty {
      color: #9ca3af;
      font-size: 11px;
      text-align: center;
    }
    .field-error {
      color: #dc2626;
      font-size: 12px;
      margin-top: -8px;
      margin-bottom: 10px;
      display: none;
    }
    .field-error.show {
      display: block;
    }
    .save-btn-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .cancel-link {
      color: #6b7280;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
    .cancel-link:hover {
      text-decoration: underline;
    }
    .post-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<header class="navbar">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <a href="index.html" class="login-btn">Home</a>
  <a href="dashboard.html" class="register-btn">Dashboard</a>
</header>

<section class="sell-section">
  <div class="sell-card">
    <h1>Edit Your Product</h1>
    <p class="sell-subtitle">Update your listing details below.</p>

    <form class="sell-form" id="editForm">
      <label>Product Title</label>
      <input type="text" id="title" required>
      <p class="field-error" id="titleError">Title cannot be empty.</p>

      <label>Category</label>
      <select id="category" required>
        <option value="">Select Category</option>
        <option>Phones</option>
        <option>Electronics</option>
        <option>Vehicles</option>
        <option>Property</option>
        <option>Fashion</option>
        <option>Jobs</option>
      </select>

      <div class="form-row">
        <div class="form-col">
          <label>Price USD</label>
          <input type="number" id="priceUsd" min="0" required>
        </div>

        <div class="form-col">
          <label>Price L$</label>
          <input type="number" id="priceLrd" min="0" required>
        </div>
      </div>
      <p class="field-error" id="priceError">Prices must be 0 or greater.</p>

      <label>Condition</label>
      <select id="condition" required>
        <option value="">Select Condition</option>
        <option>Brand New</option>
        <option>Used</option>
        <option>Foreign Used</option>
      </select>

      <div class="form-row">
        <div class="form-col">
          <label>County</label>
          <input type="text" id="county" required>
        </div>

        <div class="form-col">
          <label>City</label>
          <input type="text" id="city" required>
        </div>
      </div>

      <label>Product Images (up to 4 links)</label>
      <input type="url" id="imageUrl1" placeholder="Main image link (required)" required>
      <input type="url" id="imageUrl2" placeholder="Second image link (optional)" style="margin-top:10px;">
      <input type="url" id="imageUrl3" placeholder="Third image link (optional)" style="margin-top:10px;">
      <input type="url" id="imageUrl4" placeholder="Fourth image link (optional)" style="margin-top:10px;">

      <div class="image-preview-row" id="imagePreviewRow"></div>

      <label>Description</label>
      <textarea id="description" rows="5" required></textarea>

      <label>Phone Number</label>
      <input type="tel" id="phone" required>

      <div class="save-btn-row">
        <button type="submit" class="post-btn" id="saveBtn">Save Changes</button>
        <a href="dashboard.html" class="cancel-link">Cancel</a>
      </div>
    </form>
  </div>
</section>

<footer class="footer">
  <h2>🇱🇷 LoyaltyMarket</h2>
  <p>Buy And Sell Products Across Liberia.</p>
  <p>&copy; 2026 LoyaltyMarket. All Rights Reserved.</p>
</footer>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

const titleInput = document.getElementById("title");
const categoryInput = document.getElementById("category");
const priceUsdInput = document.getElementById("priceUsd");
const priceLrdInput = document.getElementById("priceLrd");
const conditionInput = document.getElementById("condition");
const countyInput = document.getElementById("county");
const cityInput = document.getElementById("city");
const descriptionInput = document.getElementById("description");
const phoneInput = document.getElementById("phone");
const saveBtn = document.getElementById("saveBtn");
const titleError = document.getElementById("titleError");
const priceError = document.getElementById("priceError");
const imagePreviewRow = document.getElementById("imagePreviewRow");

const imageInputs = [
  document.getElementById("imageUrl1"),
  document.getElementById("imageUrl2"),
  document.getElementById("imageUrl3"),
  document.getElementById("imageUrl4")
];

let currentUser = null;

// Tracks the listing's status as it was when the page loaded, so an
// edit doesn't accidentally overwrite "sold" or "archived" back to
// "active"/"pending_review" just because the seller updated a field.
let existingStatus = "active";

if (!productId) {
  alert("No product selected to edit.");
  window.location.href = "dashboard.html";
}

// Helper: return the first defined, non-empty value among several
// possible field names. Used so old-format and new-format listings
// both populate the form correctly.
function firstDefined(...values) {
  for (const value of values) {
    if (value !== undefined && value !== null && value !== "") {
      return value;
    }
  }
  return "";
}

function updateImagePreviews() {
  imagePreviewRow.innerHTML = "";

  imageInputs.forEach((input) => {
    const url = input.value.trim();
    const box = document.createElement("div");
    box.className = "image-preview-box";

    if (url) {
      const img = document.createElement("img");
      img.src = url;
      img.alt = "Preview";
      img.onerror = () => {
        box.classList.add("empty");
        box.textContent = "Broken link";
      };
      box.appendChild(img);
    } else {
      box.classList.add("empty");
      box.textContent = "No image";
    }

    imagePreviewRow.appendChild(box);
  });
}

imageInputs.forEach((input) => {
  input.addEventListener("input", updateImagePreviews);
});

async function loadProduct() {
  try {
    const productRef = doc(db, "products", productId);
    const productSnap = await getDoc(productRef);

    if (!productSnap.exists()) {
      alert("This product no longer exists.");
      window.location.href = "dashboard.html";
      return;
    }

    const product = productSnap.data();

    if (product.sellerId !== currentUser.uid) {
      alert("You do not have permission to edit this listing.");
      window.location.href = "dashboard.html";
      return;
    }

    existingStatus = product.status || "active";

    titleInput.value = product.title || "";
    categoryInput.value = product.category || "";

    // Backward-compatible price fields: new listings use priceUsd/priceLrd,
    // older listings used priceUSD/priceL$ (or priceLRD in some cases).
    priceUsdInput.value = firstDefined(
      product.priceUsd,
      product.priceUSD
    );

    priceLrdInput.value = firstDefined(
      product.priceLrd,
      product.priceLRD,
      product["priceL$"]
    );

    conditionInput.value = product.condition || "";
    countyInput.value = product.county || "";
    cityInput.value = product.city || "";
    descriptionInput.value = product.description || "";

    // Backward-compatible phone field: new listings use phone,
    // older listings used phoneNumber.
    phoneInput.value = firstDefined(
      product.phone,
      product.phoneNumber
    );

    // Backward-compatible images: new listings use images[],
    // older listings used a single imageUrl string.
    const existingImages = product.images && product.images.length > 0
      ? product.images
      : (product.imageUrl ? [product.imageUrl] : []);

    imageInputs.forEach((input, index) => {
      input.value = existingImages[index] || "";
    });

    updateImagePreviews();

  } catch (error) {
    alert("Could not load product: " + error.message);
    window.location.href = "dashboard.html";
  }
}

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    loadProduct();
  } else {
    window.location.href = "login.html";
  }
});

function validateForm() {
  let isValid = true;

  titleError.classList.remove("show");
  priceError.classList.remove("show");

  if (!titleInput.value.trim()) {
    titleError.classList.add("show");
    isValid = false;
  }

  const priceUsd = Number(priceUsdInput.value);
  const priceLrd = Number(priceLrdInput.value);

  if (isNaN(priceUsd) || priceUsd < 0 || isNaN(priceLrd) || priceLrd < 0) {
    priceError.classList.add("show");
    isValid = false;
  }

  if (!imageInputs[0].value.trim()) {
    isValid = false;
    alert("Please provide at least one product image link.");
  }

  return isValid;
}

// ================= RULE-BASED SCAM DETECTION =================
// Same free, rule-based checks used on new listings (sell.html),
// re-run whenever a listing is edited. If a previously-clean
// listing gets edited into something that trips these rules (e.g.
// price dropped very low, suspicious wording added), it goes back
// to "pending_review" so an admin can take a look before it stays
// visible to buyers. Listings already marked "sold" or "archived"
// are left alone — an edit shouldn't un-sell or un-archive them.

const CATEGORY_PRICE_FLOORS = {
  Phones: 15,
  Electronics: 10,
  Vehicles: 300,
  Property: 500,
  Fashion: 1,
  Jobs: 0
};

const SUSPICIOUS_KEYWORDS = [
  "wire transfer",
  "western union",
  "send deposit",
  "send a deposit",
  "pay deposit first",
  "urgent sale",
  "no returns",
  "no refunds",
  "cash only no meet",
  "moneygram",
  "gift card"
];

function checkPriceTooLow(category, priceUsd) {
  const floor = CATEGORY_PRICE_FLOORS[category];
  if (floor === undefined) return false;
  const price = Number(priceUsd);
  if (!Number.isFinite(price)) return false;
  return price > 0 && price < floor;
}

function checkSuspiciousKeywords(title, description) {
  const combinedText = `${title} ${description}`.toLowerCase();
  return SUSPICIOUS_KEYWORDS.some((keyword) => combinedText.includes(keyword));
}

function checkMissingImage(images) {
  return images.length === 0;
}

function runScamChecks({ title, description, category, priceUsd, images }) {
  const reasons = [];

  if (checkPriceTooLow(category, priceUsd)) {
    reasons.push("Price is unusually low for this category.");
  }

  if (checkSuspiciousKeywords(title, description)) {
    reasons.push("Listing text contains language commonly used in scams.");
  }

  if (checkMissingImage(images)) {
    reasons.push("No product image was provided.");
  }

  return reasons;
}
// ================= END SCAM DETECTION =================

document.getElementById("editForm").addEventListener("submit", async (event) => {
  event.preventDefault();

  if (!validateForm()) {
    return;
  }

  const images = imageInputs
    .map((input) => input.value.trim())
    .filter((url) => url !== "");

  const priceUsdValue = priceUsdInput.value;
  const priceLrdValue = priceLrdInput.value;
  const phoneValue = phoneInput.value.trim();
  const titleValue = titleInput.value.trim();
  const descriptionValue = descriptionInput.value.trim();
  const categoryValue = categoryInput.value;

  const flagReasons = runScamChecks({
    title: titleValue,
    description: descriptionValue,
    category: categoryValue,
    priceUsd: priceUsdValue,
    images: images
  });

  const isFlagged = flagReasons.length > 0;

  // Don't let an edit undo a "sold" or "archived" status — only
  // adjust status between active/pending_review.
  let newStatus = existingStatus;
  if (existingStatus === "active" || existingStatus === "pending_review") {
    newStatus = isFlagged ? "pending_review" : "active";
  }

  // Save BOTH new-format and old-format field names on every update,
  // so any older page or tool still reading the legacy field names
  // keeps working, while new pages use the new field names.
  const updatedProduct = {
    title: titleValue,
    category: categoryValue,

    priceUsd: priceUsdValue,
    priceUSD: priceUsdValue,

    priceLrd: priceLrdValue,
    priceLRD: priceLrdValue,
    "priceL$": priceLrdValue,

    condition: conditionInput.value,
    county: countyInput.value.trim(),
    city: cityInput.value.trim(),

    imageUrl: images[0] || "",
    images: images,

    description: descriptionValue,

    phone: phoneValue,
    phoneNumber: phoneValue,

    status: newStatus,
    flagged: isFlagged,
    flagReasons: flagReasons
  };

  saveBtn.disabled = true;
  saveBtn.textContent = "Saving...";

  try {
    await updateDoc(doc(db, "products", productId), updatedProduct);

    if (isFlagged && existingStatus !== "sold" && existingStatus !== "archived") {
      alert("Your changes were saved, but this listing needs a quick admin review before it's visible again. This usually happens for things like unusually low prices or missing photos.");
    } else {
      alert("Product updated successfully!");
    }

    window.location.href = "dashboard.html";
  } catch (error) {
    alert("Could not save changes: " + error.message);
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Changes";
  }
});
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service worker registered'))
      .catch((error) => console.log('Service worker registration failed:', error));
  }
</script>

</body>
</html>
